<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Binder BR</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --panel: #111620;
      --panel-2: #171d28;
      --panel-3: #1f2633;
      --line: #2a3240;
      --line-soft: rgba(255, 255, 255, 0.08);
      --text: #eff4fb;
      --muted: #8f9bab;
      --soft: #c9d2df;
      --accent: #ef4444;
      --accent-2: #facc15;
      --good: #39c37d;
      --warn: #f59e0b;
      --bad: #f87171;
      --normal: #facc15;
      --holo: #a78bfa;
      --reverse: #38bdf8;
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.38);
      --sidebar-width: 308px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #setHero[hidden],
    #controlBar[hidden] {
      display: none !important;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    body {
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button,
    a.buttonish,
    label.file-button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151b26;
      color: var(--soft);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      white-space: nowrap;
    }

    button:hover,
    a.buttonish:hover,
    label.file-button:hover {
      border-color: #3d4656;
      background: #1c2430;
      color: var(--text);
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid rgba(56, 189, 248, 0.85);
      outline-offset: 2px;
    }

    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
      height: 100vh;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(239, 68, 68, 0.08), transparent 260px),
        radial-gradient(circle at 50% -10%, rgba(250, 204, 21, 0.08), transparent 260px),
        var(--bg);
    }

    .sidebar {
      width: var(--sidebar-width);
      height: 100vh;
      background: rgba(13, 17, 24, 0.98);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-width: 0;
      z-index: 30;
    }

    .brand-row {
      min-height: 72px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0;
      color: #fff;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #0a0d12;
      background:
        linear-gradient(180deg, #f8fafc 49%, #111827 50%),
        linear-gradient(90deg, #ef4444, #facc15);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
      position: relative;
    }

    .brand-mark::after {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #0f172a;
      border: 2px solid #f8fafc;
      position: absolute;
    }

    .sync-pill {
      display: inline-flex;
      align-items: center;
      grid-column: 1 / -1;
      justify-content: center;
      min-width: 0;
      height: 26px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 0 9px;
      color: var(--muted);
      font-size: 12px;
      background: #121823;
    }

    .sync-pill.syncing {
      color: #fef3c7;
      border-color: rgba(245, 158, 11, 0.35);
      background: rgba(245, 158, 11, 0.08);
    }

    .sync-pill.ready {
      color: #bbf7d0;
      border-color: rgba(57, 195, 125, 0.35);
      background: rgba(57, 195, 125, 0.08);
    }

    .sidebar-toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line-soft);
    }

    .sidebar-trophy-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 6px;
      padding: 10px 14px 0;
    }

    .sidebar-trophy-count {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #101620;
      padding: 5px 4px;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .sidebar-trophy-count .trophy-icon {
      width: 22px;
      height: 22px;
      opacity: 1;
    }

    .home-button {
      grid-column: 1 / -1;
      justify-content: flex-start;
      font-weight: 800;
    }

    .home-button.active {
      background: rgba(239, 68, 68, 0.12);
      color: #fff;
      border-color: rgba(239, 68, 68, 0.35);
    }

    .nav-button {
      grid-column: 1 / -1;
      justify-content: flex-start;
      font-weight: 800;
    }

    .nav-button.active {
      background: rgba(239, 68, 68, 0.12);
      color: #fff;
      border-color: rgba(239, 68, 68, 0.35);
    }

    .sidebar-language-tabs {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .sidebar-language-tabs .language-tab {
      min-width: 0;
      padding-inline: 6px;
    }

    .flag-tab {
      font-size: 17px;
      line-height: 1;
    }

    .sidebar-toolbar button {
      min-height: 34px;
      font-size: 13px;
      padding-inline: 8px;
    }

    #syncNowBtn {
      display: none;
    }

    .tree {
      overflow: auto;
      padding: 8px 8px 24px;
      scrollbar-color: #384252 transparent;
    }

    .lang-block + .lang-block {
      margin-top: 8px;
    }

    .lang-header,
    .series-link,
    .set-row {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--soft);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      text-align: left;
      min-height: 36px;
      padding: 0 8px;
    }

    .lang-header {
      color: #fff;
      font-weight: 800;
      background: #121823;
      border: 1px solid var(--line-soft);
    }

    .series-header {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      gap: 2px;
      margin-top: 8px;
    }

    .series-toggle {
      min-width: 0;
      min-height: 32px;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #f3f6fb;
    }

    .series-link {
      font-weight: 750;
      font-size: 13px;
      grid-template-columns: minmax(0, 1fr) auto;
      color: #f3f6fb;
    }

    .series-header.active .series-link {
      background: rgba(239, 68, 68, 0.12);
      color: #fff;
    }

    .set-row {
      grid-template-columns: 18px minmax(0, 1fr) auto;
      min-height: 34px;
      color: #aab4c4;
      font-size: 13px;
      padding-left: 18px;
      margin-top: 2px;
    }

    .set-row:hover,
    .series-link:hover,
    .series-toggle:hover {
      background: #171d28;
    }

    .set-row.active {
      background: rgba(239, 68, 68, 0.12);
      color: #fff;
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .chev {
      color: #748093;
      font-size: 12px;
      width: 18px;
    }

    .tree-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0;
    }

    .tree-count {
      color: #6f7b8d;
      font-size: 11px;
      margin-left: 8px;
    }

    .main {
      min-width: 0;
      height: 100vh;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 22px;
      background: rgba(9, 11, 16, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line-soft);
    }

    .mobile-sets,
    .mobile-close {
      display: none;
    }

    .search-wrap {
      position: relative;
      min-width: 0;
    }

    .search-wrap::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      border: 2px solid #7d8795;
      border-radius: 999px;
    }

    .search-wrap::after {
      content: "";
      position: absolute;
      left: 25px;
      top: 24px;
      width: 7px;
      height: 2px;
      border-radius: 999px;
      background: #7d8795;
      transform: rotate(45deg);
    }

    .search-input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #111722;
      color: var(--text);
      padding: 0 12px 0 42px;
    }

    .search-input::placeholder {
      color: #6f7b8d;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .language-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .language-tab.active {
      background: rgba(239, 68, 68, 0.14);
      border-color: rgba(239, 68, 68, 0.38);
      color: #fff;
    }

    .top-actions select {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151b26;
      color: var(--soft);
      padding: 0 30px 0 10px;
      max-width: 180px;
    }

    .danger {
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.32);
      background: rgba(248, 113, 113, 0.08);
    }

    .page {
      width: min(1680px, 100%);
      margin: 0 auto;
      padding: 22px;
    }

    .notice-stack {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .notice {
      border: 1px solid rgba(245, 158, 11, 0.32);
      color: #fde68a;
      background: rgba(245, 158, 11, 0.08);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .notice.error {
      border-color: rgba(248, 113, 113, 0.35);
      color: #fecaca;
      background: rgba(248, 113, 113, 0.09);
    }

    .notice button {
      min-height: 24px;
      height: 24px;
      padding: 0 8px;
      font-size: 12px;
    }

    .set-hero {
      display: block;
      margin: -22px -22px 18px;
      padding: 48px 22px 28px;
      border-bottom: 1px solid var(--line-soft);
      background:
        radial-gradient(circle at 24% 10%, rgba(56, 189, 248, 0.14), transparent 28%),
        radial-gradient(circle at 75% 0%, rgba(239, 68, 68, 0.16), transparent 30%),
        linear-gradient(180deg, #1d2230 0%, #151923 58%, #0b0e14 100%);
    }

    .set-title-row {
      display: grid;
      grid-template-columns: minmax(220px, 360px) minmax(0, 1fr);
      align-items: start;
      gap: 28px;
      min-width: 0;
      max-width: 1680px;
      margin: 0 auto;
    }

    .set-mark {
      width: min(360px, 100%);
      min-width: 0;
      height: 148px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      border: 0;
      background: transparent;
      overflow: visible;
    }

    .set-mark img {
      max-width: 100%;
      max-height: 142px;
      display: block;
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.42));
    }

    .set-mark.image-missing {
      color: var(--muted);
      font-weight: 800;
      font-size: 22px;
      border: 1px solid var(--line-soft);
      background: #111722;
      overflow: hidden;
    }

    .set-mark.image-missing img {
      display: none;
    }

    .set-heading {
      min-width: 0;
      flex: 1;
      align-self: center;
    }

    .set-heading h1 {
      margin: 0;
      font-size: clamp(24px, 3.2vw, 42px);
      line-height: 1.02;
      letter-spacing: 0;
      color: #fff;
      overflow-wrap: anywhere;
    }

    .set-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .series-inline-link {
      min-height: 0;
      height: auto;
      border: 0;
      background: transparent;
      color: #38bdf8;
      padding: 0;
      font: inherit;
      font-weight: 800;
    }

    .series-inline-link:hover {
      color: #7dd3fc;
      text-decoration: underline;
    }

    .control-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 0;
      flex-wrap: wrap;
    }

    .control-group,
    .legend {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .segmented {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #101620;
    }

    .segmented button {
      min-height: 30px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      padding-inline: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .segmented button.active {
      background: #222b38;
      color: #fff;
    }

    .sort-select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #151b26;
      color: var(--soft);
      padding: 0 32px 0 10px;
    }

    .legend {
      color: var(--muted);
      font-size: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
    }

    .dot.normal {
      background: var(--normal);
    }

    .dot.holo {
      background: var(--holo);
    }

    .dot.reverse {
      background: var(--reverse);
    }

    .album {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
      gap: 18px;
      padding-bottom: 60px;
    }

    .album.view-table {
      display: block;
    }

    .album.view-binder {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      align-items: start;
    }

    .home-album {
      display: grid;
      gap: 16px;
      padding-bottom: 60px;
    }

    .home-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
      gap: 18px;
    }

    .home-card-grid.view-table {
      display: block;
    }

    .home-card-grid.view-binder {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      align-items: start;
    }

    .home-summary-card {
      width: min(760px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line-soft);
      border-radius: 22px;
      background: #2a303d;
      padding: 28px 34px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .home-summary-title {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #fff;
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 22px;
    }

    .home-summary-title .flag {
      font-size: 24px;
      line-height: 1;
    }

    .home-kpis {
      display: flex;
      justify-content: center;
      gap: 34px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .home-kpi {
      display: grid;
      gap: 6px;
      min-width: 120px;
    }

    .home-kpi-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 900;
    }

    .home-kpi-value {
      color: #fff;
      font-size: 21px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .type-count-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(102px, 1fr));
      gap: 14px 22px;
      align-items: center;
      justify-items: start;
    }

    .type-count {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .type-icon {
      width: 28px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      color: #111827;
      font-size: 15px;
      font-weight: 1000;
      line-height: 1;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
    }

    .type-icon.grass { background: #35c66b; }
    .type-icon.fire { background: #ff6447; }
    .type-icon.water { background: #46b7f1; }
    .type-icon.lightning { background: #facc15; }
    .type-icon.psychic { background: #c084fc; }
    .type-icon.fighting { background: #ff785a; }
    .type-icon.darkness { background: #6f8aa3; }
    .type-icon.metal { background: #cbd5e1; }
    .type-icon.dragon { background: #d8b94c; }
    .type-icon.colorless { background: #f8fafc; }
    .type-icon.fairy { background: #f472b6; }

    .missing-set-panel {
      max-width: 720px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: #111722;
      padding: 28px;
      color: var(--soft);
      box-shadow: var(--shadow);
    }

    .missing-set-panel h1 {
      margin: 0 0 8px;
      color: #fff;
      font-size: 28px;
    }

    .missing-set-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .pagination-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #111722;
      padding: 8px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .pagination-actions {
      display: flex;
      gap: 8px;
    }

    .trophy-room {
      display: grid;
      gap: 18px;
      padding-bottom: 60px;
    }

    .series-set-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 18px;
      padding-bottom: 60px;
    }

    .series-set-card {
      min-width: 0;
      min-height: 178px;
      display: grid;
      grid-template-columns: 168px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background:
        radial-gradient(circle at 18% 10%, rgba(56, 189, 248, 0.12), transparent 30%),
        #111722;
      color: var(--text);
      padding: 16px;
      text-align: left;
      box-shadow: var(--shadow);
    }

    .series-set-card:hover {
      border-color: rgba(56, 189, 248, 0.38);
      background:
        radial-gradient(circle at 18% 10%, rgba(56, 189, 248, 0.18), transparent 30%),
        #151c28;
    }

    .series-set-logo {
      min-width: 0;
      display: grid;
      place-items: center;
      height: 116px;
    }

    .series-set-logo img {
      max-width: 156px;
      max-height: 104px;
      display: block;
      filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.35));
    }

    .series-set-info {
      min-width: 0;
      display: grid;
      gap: 10px;
    }

    .series-set-name {
      color: #fff;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.1;
    }

    .series-set-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .series-progress {
      display: grid;
      gap: 5px;
    }

    .series-progress-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .trophy-season {
      display: grid;
      gap: 10px;
    }

    .trophy-season-title {
      color: #fff;
      font-size: 18px;
      font-weight: 900;
    }

    .trophy-season-shelf {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 10px;
    }

    .trophy-slot {
      min-height: 118px;
      display: grid;
      grid-template-rows: 1fr 42px 18px;
      place-items: center;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #101620;
      color: var(--text);
      font: inherit;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      appearance: none;
    }

    .trophy-slot .trophy-icon {
      width: 58px;
      height: 58px;
    }

    .trophy-slot.no-trophy {
      background: #0d131d;
    }

    .trophy-slot:hover,
    .trophy-slot:focus-visible {
      border-color: rgba(56, 189, 248, 0.42);
      background: #151d2a;
      outline: none;
    }

    .trophy-slot.no-trophy:hover,
    .trophy-slot.no-trophy:focus-visible {
      background: #101722;
    }

    .trophy-slot-logo {
      width: 100%;
      height: 40px;
      display: grid;
      place-items: center;
    }

    .trophy-slot-logo img {
      max-width: 102px;
      max-height: 38px;
      display: block;
    }

    .trophy-slot-date {
      color: #7d8795;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    .table-list {
      display: grid;
      gap: 8px;
      padding-bottom: 60px;
    }

    .card-row {
      min-width: 0;
      display: grid;
      grid-template-columns: 52px minmax(160px, 1fr) minmax(120px, 0.7fr) minmax(190px, auto) auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #111722;
      padding: 8px 10px;
    }

    .card-row-thumb {
      width: 44px;
      aspect-ratio: 63 / 88;
      border-radius: 5px;
      overflow: hidden;
      background: #0f141d;
      display: grid;
      place-items: center;
    }

    .card-row-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-row-thumb.image-missing img {
      display: none;
    }

    .card-row.missing .card-row-thumb img {
      opacity: 0.45;
      filter: saturate(0.32) brightness(0.78);
    }

    .card-row-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .card-row-name {
      color: #fff;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-row-sub,
    .card-row-price {
      color: var(--muted);
      font-size: 12px;
    }

    .card-row-variants {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .binder-page {
      min-width: 0;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #101620;
      padding: 12px;
      display: grid;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .binder-page-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .binder-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .album.view-binder .card-body {
      padding-top: 6px;
      gap: 4px;
    }

    .album.view-binder .card-name {
      min-height: auto;
      font-size: 12px;
    }

    .album.view-binder .card-meta {
      display: none;
    }

    .card-tile {
      min-width: 0;
    }

    .card-image-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 63 / 88;
      border-radius: 8px;
      background: #0f141d;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-image-shell img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: opacity 160ms ease, filter 160ms ease;
    }

    .card-tile.missing .card-image-shell img {
      opacity: 0.42;
      filter: saturate(0.32) brightness(0.78);
    }

    .card-tile.owned .card-image-shell img {
      opacity: 1;
      filter: none;
    }

    .card-image-shell.image-missing img {
      display: none;
    }

    .image-placeholder {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      padding: 12px;
      text-align: center;
      color: #7d8795;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent 40%),
        #111722;
      font-size: 13px;
    }

    .card-image-shell.image-missing .image-placeholder {
      display: flex;
    }

    .variant-stack {
      position: absolute;
      right: 7px;
      bottom: 7px;
      display: flex;
      align-items: center;
      gap: 5px;
      max-width: calc(100% - 14px);
      flex-wrap: wrap;
      justify-content: flex-end;
      z-index: 2;
    }

    .variant-badge {
      min-height: 28px;
      height: 28px;
      min-width: 32px;
      padding: 0 7px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #0c0f16;
      font-weight: 900;
      font-size: 12px;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.38);
    }

    .variant-badge.normal {
      background: var(--normal);
    }

    .variant-badge.holo {
      background: var(--holo);
    }

    .variant-badge.reverse {
      background: var(--reverse);
    }

    .variant-badge.zero {
      opacity: 0.82;
    }

    .card-body {
      padding: 10px 1px 0;
      display: grid;
      gap: 7px;
    }

    .card-meta {
      display: grid;
      gap: 5px;
    }

    .card-meta-top,
    .card-meta-bottom {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .card-name {
      color: #fff;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.2;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow-wrap: anywhere;
    }

    .card-price {
      color: #34d399;
      font-weight: 900;
      font-size: 14px;
      white-space: nowrap;
    }

    .card-price.empty {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .card-number {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .card-meta-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .dupe-pill,
    .price-pill {
      min-height: 26px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      font-size: 12px;
      border: 1px solid var(--line-soft);
      color: var(--muted);
      background: #111722;
      white-space: nowrap;
    }

    .dupe-pill.on {
      color: #bbf7d0;
      border-color: rgba(57, 195, 125, 0.3);
      background: rgba(57, 195, 125, 0.08);
    }

    .liga-link {
      min-height: 28px;
      border-radius: 8px;
      border: 1px solid rgba(239, 68, 68, 0.35);
      background: rgba(239, 68, 68, 0.1);
      color: #fecaca;
      padding: 0 9px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      justify-content: center;
    }

    .card-actions .liga-link {
      grid-column: 1 / -1;
    }

    .cart-add,
    .cart-icon {
      color: #bbf7d0;
      border-color: rgba(57, 195, 125, 0.32);
      background: rgba(57, 195, 125, 0.08);
    }

    .cart-icon {
      width: 30px;
      min-width: 30px;
      height: 30px;
      min-height: 30px;
      padding: 0;
      border-radius: 8px;
    }

    .cart-icon.normal {
      color: #111827;
      border-color: rgba(250, 204, 21, 0.45);
      background: var(--normal);
    }

    .cart-icon.holo {
      color: #111827;
      border-color: rgba(167, 139, 250, 0.55);
      background: var(--holo);
    }

    .cart-icon.reverse {
      color: #07111f;
      border-color: rgba(56, 189, 248, 0.55);
      background: var(--reverse);
    }

    .cart-icon svg {
      width: 16px;
      height: 16px;
      display: block;
      stroke: currentColor;
    }

    .rarity-symbol {
      min-width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
      color: #facc15;
      filter: drop-shadow(0 1px 0 rgba(0, 0, 0, 0.55));
      font-size: 17px;
      line-height: 1;
    }

    .rarity-symbol.common {
      color: #94a3b8;
    }

    .rarity-symbol.uncommon {
      color: #38bdf8;
    }

    .rarity-symbol.rare,
    .rarity-symbol.ultra,
    .rarity-symbol.secret {
      color: #facc15;
    }

    .preview-overlay,
    .cart-overlay,
    .cloud-overlay {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0, 0, 0, 0.72);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .preview-overlay[hidden],
    .cart-overlay[hidden],
    .cloud-overlay[hidden] {
      display: none;
    }

    .cloud-dialog {
      width: min(560px, 100%);
      max-height: min(92vh, 720px);
      display: grid;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101620;
      box-shadow: var(--shadow);
      padding: 16px;
      overflow: auto;
    }

    .cloud-head,
    .cloud-actions,
    .cloud-status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cloud-head,
    .cloud-status-row {
      justify-content: space-between;
    }

    .cloud-head h2 {
      margin: 0;
      color: #fff;
      font-size: 22px;
    }

    .cloud-field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .cloud-field input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1018;
      color: var(--text);
      padding: 0 10px;
    }

    .cloud-status {
      color: var(--muted);
      font-size: 13px;
    }

    .cloud-status.connected {
      color: #86efac;
    }

    .cloud-status.error {
      color: #fca5a5;
    }

    #cloudBtn.connected {
      color: #bbf7d0;
      border-color: rgba(57, 195, 125, 0.35);
      background: rgba(57, 195, 125, 0.08);
    }

    .preview-dialog {
      width: min(960px, 100%);
      max-height: min(92vh, 900px);
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(260px, 1fr);
      gap: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101620;
      box-shadow: var(--shadow);
      padding: 14px;
      overflow: auto;
    }

    .preview-image {
      width: 100%;
      aspect-ratio: 63 / 88;
      display: grid;
      place-items: center;
      background: #0b1018;
      border-radius: 8px;
      overflow: hidden;
    }

    .preview-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .preview-info {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      padding: 4px;
    }

    .preview-title {
      margin: 0;
      color: #fff;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .preview-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .preview-variants {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .preview-actions,
    .cart-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .trophy-shelf {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #111722;
      padding: 10px;
      display: none;
      gap: 8px;
    }

    .tracker-panel {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      width: min(760px, 100%);
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #111722;
      padding: 10px 12px;
      margin-top: 10px;
    }

    .trophy-icon {
      --trophy-main: #64748b;
      --trophy-light: #cbd5e1;
      --trophy-dark: #334155;
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      color: var(--trophy-main);
    }

    .trophy-icon.none {
      opacity: 0.16;
      filter: grayscale(1);
    }

    .trophy-icon.copper {
      --trophy-main: #d97706;
      --trophy-light: #fed7aa;
      --trophy-dark: #92400e;
    }

    .trophy-icon.silver {
      --trophy-main: #cbd5e1;
      --trophy-light: #f8fafc;
      --trophy-dark: #94a3b8;
    }

    .trophy-icon.gold {
      --trophy-main: #facc15;
      --trophy-light: #fef3c7;
      --trophy-dark: #d97706;
    }

    .trophy-icon.platinum {
      --trophy-main: #d8b4fe;
      --trophy-light: #e0f2fe;
      --trophy-dark: #818cf8;
    }

    .trophy-svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.32));
    }

    .tracker-bars {
      display: grid;
      gap: 6px;
    }

    .tracker-row {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr) 96px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .tracker-row-count {
      color: #dbeafe;
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
    }

    .mini-track {
      height: 7px;
      border-radius: 999px;
      background: #1f2633;
      overflow: hidden;
    }

    .mini-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .tracker-total {
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      white-space: nowrap;
      text-align: right;
    }

    .shelf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
    }

    .shelf-item {
      min-width: 0;
      display: grid;
      gap: 6px;
      justify-items: center;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #101620;
      padding: 8px;
      text-align: center;
    }

    .shelf-item .trophy-icon {
      width: 42px;
      height: 42px;
    }

    .shelf-logo {
      width: 64px;
      height: 36px;
      display: grid;
      place-items: center;
    }

    .shelf-logo img {
      max-width: 64px;
      max-height: 36px;
      display: block;
    }

    .shelf-name {
      width: 100%;
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cart-dialog {
      width: min(880px, 100%);
      max-height: min(92vh, 860px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101620;
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 14px;
      overflow: auto;
    }

    .cart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .cart-head h2 {
      margin: 0;
      font-size: 22px;
      color: #fff;
    }

    .cart-list {
      display: grid;
      gap: 8px;
    }

    .cart-export-panel {
      display: grid;
      gap: 8px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #111722;
      padding: 10px;
    }

    .cart-page-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      flex-wrap: wrap;
    }

    .cart-page-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cart-page-actions button {
      min-height: 30px;
      font-size: 12px;
      padding-inline: 9px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #111722;
      padding: 9px;
    }

    .cart-item-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .cart-item-name {
      color: #fff;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cart-item-sub {
      color: var(--muted);
      font-size: 12px;
    }

    .cart-qty {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--soft);
      font-weight: 800;
    }

    .cart-list-text {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1018;
      color: var(--soft);
      padding: 10px;
      font: 13px/1.45 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .empty-state {
      grid-column: 1 / -1;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #111722;
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 22px;
    }

    .skeleton-grid {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(164px, 1fr));
      gap: 18px;
    }

    .skeleton {
      aspect-ratio: 63 / 88;
      border-radius: 8px;
      background: linear-gradient(90deg, #111722, #1b2430, #111722);
      background-size: 300% 100%;
      animation: shimmer 1.3s linear infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 100% 0;
      }
      100% {
        background-position: -100% 0;
      }
    }

    .sidebar-overlay {
      display: none;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 860px) {
      body {
        overflow: auto;
      }

      .app-shell {
        display: block;
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        transform: translateX(-100%);
        transition: transform 180ms ease;
        box-shadow: 20px 0 48px rgba(0, 0, 0, 0.55);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 20;
      }

      .sidebar-overlay.open {
        display: block;
      }

      .main {
        height: auto;
        min-height: 100vh;
        overflow: visible;
      }

      .mobile-sets,
      .mobile-close {
        display: inline-flex;
      }

      .topbar {
        grid-template-columns: auto minmax(0, 1fr);
        padding: 12px;
      }

      .top-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }

      .page {
        padding: 14px 12px 28px;
      }

      .set-hero {
        margin: -14px -12px 14px;
        padding: 30px 12px 22px;
      }

      .set-title-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .album,
      .home-card-grid,
      .series-set-grid,
      .skeleton-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .album.view-binder,
      .home-card-grid.view-binder {
        grid-template-columns: 1fr;
      }

      .series-set-card {
        grid-template-columns: 1fr;
      }

      .preview-dialog {
        grid-template-columns: 1fr;
      }

      .cart-item {
        grid-template-columns: 1fr;
      }

      .card-row {
        grid-template-columns: 48px minmax(0, 1fr);
        align-items: start;
      }

      .card-row-price,
      .card-row-variants,
      .card-row .liga-link,
      .card-row .cart-add,
      .card-row .cart-icon {
        grid-column: 2;
        justify-content: flex-start;
      }

      .card-name {
        font-size: 13px;
        min-height: 32px;
      }
    }

    @media (max-width: 460px) {
      :root {
        --sidebar-width: min(318px, 92vw);
      }

      .set-title-row {
        align-items: flex-start;
      }

      .set-mark {
        width: min(260px, 100%);
        min-width: 0;
        height: 112px;
      }

      .set-mark img {
        max-width: 100%;
        max-height: 104px;
      }

      .tracker-panel {
        grid-template-columns: 52px minmax(0, 1fr);
      }

      .tracker-total {
        grid-column: 2;
      }

      .variant-badge {
        min-width: 29px;
        height: 26px;
        min-height: 26px;
        padding-inline: 6px;
      }
    }

          addNotice("IndexedDB is unavailable, so this session is using the embedded fallback plus in-memory changes.", "error");

        }

        if (state.sets.has(state.selectedSetKey)) {
          selectSet(state.selectedSetKey, { skipFetch: false });
        } else {

        }

        els.sidebarOverlay.addEventListener("click", () => setSidebarOpen(false));

        els.searchInput.addEventListener("input", (event) => {
          state.query = event.target.value.trim();
          state.homePage = 1;
          renderAlbum();
        });

        els.languageTabs.addEventListener("click", (event) => {
          const button = event.target.closest("[data-lang-jump]");
          if (!button) return;
          switchLanguage(button.dataset.langJump);
        });

        els.filterControls.addEventListener("click", (event) => {
          const button = event.target.closest("button[data-filter]");
          if (!button) return;
          state.filter = button.dataset.filter;
          state.homePage = 1;
          renderControls();
          renderAlbum();
        });

        els.variantControls.addEventListener("click", (event) => {
          const secretButton = event.target.closest("button[data-secret-filter]");
          if (secretButton) {
            state.includeSecretCards = !state.includeSecretCards;
            state.homePage = 1;
            renderControls();
            renderAlbum();
            return;
          }

          const button = event.target.closest("button[data-variant-filter]");
          if (!button) return;
          const variant = button.dataset.variantFilter;
          if (state.variantFilters.has(variant)) {
            if (state.variantFilters.size === 1) return;
            state.variantFilters.delete(variant);
          } else {
            state.variantFilters.add(variant);
          }
          state.homePage = 1;
          renderControls();
          renderAlbum();
        });

        els.sortSelect.addEventListener("change", () => {
          const [sort, sortDir] = els.sortSelect.value.split(":");
          state.sort = sort || "number";
          state.sortDir = sortDir === "desc" ? "desc" : "asc";
          state.homePage = 1;
          renderAlbum();
        });

          state.homePage = 1;
          renderControls();
          renderAlbum();
        });
        els.buyFilteredBtn.addEventListener("click", buyFilteredCards);

        els.album.addEventListener("click", (event) => {
          const pageButton = event.target.closest("[data-home-page]");
          if (pageButton) {
            state.homePage = Math.max(1, Number(pageButton.dataset.homePage || 1));
            renderAlbum();
            return;
          }

          const seriesSetButton = event.target.closest("[data-series-set-key]");
          if (seriesSetButton) {
            selectSet(seriesSetButton.dataset.seriesSetKey);
            return;
          }

          const button = event.target.closest(".variant-badge");
          if (button) {
            updateVariantQuantity(button.dataset.cardKey, button.dataset.variant, 1);
            return;
          }

          const cartButton = event.target.closest("[data-cart-add]");
          if (cartButton) {
            addToCart(cartButton.dataset.cartAdd, cartButton.dataset.cartVariant || "normal");
            return;
          }

          if (event.target.closest("a, button, input, select, textarea")) return;
          const cardHost = event.target.closest("[data-card-key]");
          if (cardHost) {
            openCardPreview(cardHost.dataset.cardKey);
          }
        });

        els.album.addEventListener("contextmenu", (event) => {
          const button = event.target.closest(".variant-badge");
          if (!button) return;
          event.preventDefault();
          updateVariantQuantity(button.dataset.cardKey, button.dataset.variant, -1);
        });

        els.setHero.addEventListener("click", (event) => {
          const seriesButton = event.target.closest("[data-series-open]");
          if (!seriesButton) return;
          selectSeriesPage(seriesButton.dataset.seriesOpen);
        });

        document.addEventListener("error", (event) => {
          const img = event.target;
          if (!(img instanceof HTMLImageElement)) return;
          if (tryNextImageFallback(img)) return;
          const cardShell = img.closest(".card-image-shell");
          if (cardShell) {
            cardShell.classList.add("image-missing");
            return;
          }
          const rowThumb = img.closest(".card-row-thumb");
          if (rowThumb) {
            rowThumb.classList.add("image-missing");
            rowThumb.textContent = "No image";
            return;
          }
          const logoHost = img.closest(".set-mark, .trophy-slot-logo, .series-set-logo, .shelf-logo");
          if (logoHost && img.dataset.logoText) {
            logoHost.classList.add("image-missing");
            logoHost.textContent = img.dataset.logoText;
            return;
          }
          const setMark = img.closest(".set-mark");
          if (setMark) {
            setMark.classList.add("image-missing");
          }
        }, true);

        els.exportBtn.addEventListener("click", exportBackup);
        els.importBtn.addEventListener("click", () => els.importFile.click());
        els.importFile.addEventListener("change", importBackup);
        els.resetCollectionBtn.addEventListener("click", resetCollectionOnly);

        els.cloudBtn.addEventListener("click", openCloud);
        els.cardPreview.addEventListener("click", (event) => {
          if (event.target === els.cardPreview || event.target.closest("[data-close-preview]")) {
            closeCardPreview();
            return;
          }
          const variantButton = event.target.closest(".variant-badge");
          if (variantButton) {
            updateVariantQuantity(variantButton.dataset.cardKey, variantButton.dataset.variant, 1);
            return;
          }
          const addButton = event.target.closest("[data-cart-add]");
          if (addButton) {
            addToCart(addButton.dataset.cartAdd, addButton.dataset.cartVariant || "normal");
            return;
          }
          const action = event.target.closest("[data-cart-action]");
          if (action) {
            handleCartAction(action.dataset.cartAction, action.dataset.cartKey);
          }
        });
        els.cardPreview.addEventListener("contextmenu", (event) => {
          const variantButton = event.target.closest(".variant-badge");
          if (!variantButton) return;
          event.preventDefault();
          updateVariantQuantity(variantButton.dataset.cardKey, variantButton.dataset.variant, -1);
        });
        els.cartOverlay.addEventListener("click", (event) => {
          if (event.target === els.cartOverlay || event.target.closest("[data-close-cart]")) {
            closeCart();
            return;
          }
          const action = event.target.closest("[data-cart-action]");
          if (action) {
            handleCartAction(action.dataset.cartAction, action.dataset.cartKey);
          }
        });
        els.cloudOverlay.addEventListener("click", (event) => {
          if (event.target === els.cloudOverlay || event.target.closest("[data-close-cloud]")) {
            closeCloud();
            return;
          }
          const action = event.target.closest("[data-cloud-action]");
          if (action) {
            handleCloudAction(action.dataset.cloudAction);
          }
        });
        document.addEventListener("keydown", (event) => {
          if (event.key !== "Escape") return;
          closeCardPreview();
          closeCart();
          closeCloud();
        });
      }

      function seedFallbackCatalog() {
        FALLBACK_SETS.forEach((set) => mergeSet(normalizeSetRecord(set, set.lang), false));
        FALLBACK_CARDS.forEach((card) => mergeCard(normalizeCardRecord(card, card.lang, card.setId), false));
        state.selectedSetKey = "trophies";
        state.missingSet = null;
      }

      // IndexedDB schema: catalog sets/cards are stored separately from user collection quantities.
      // Catalog sync writes only the "sets" and "cards" stores; variant counts live in "collection".
      function openDatabase() {
        return new Promise((resolve, reject) => {
          if (!("indexedDB" in window)) {
            reject(new Error("IndexedDB is not supported"));
            return;
          }

          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onerror = () => reject(request.error || new Error("IndexedDB open failed"));
          request.onblocked = () => reject(new Error("IndexedDB migration was blocked"));
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains("sets")) {
              const store = db.createObjectStore("sets", { keyPath: "key" });
              store.createIndex("lang", "lang", { unique: false });
              store.createIndex("seriesKey", "seriesKey", { unique: false });
            }
            if (!db.objectStoreNames.contains("cards")) {
              const store = db.createObjectStore("cards", { keyPath: "key" });
              store.createIndex("setKey", "setKey", { unique: false });
              store.createIndex("lang", "lang", { unique: false });
            }
            if (!db.objectStoreNames.contains("collection")) {
              db.createObjectStore("collection", { keyPath: "cardKey" });
            }
            if (!db.objectStoreNames.contains("meta")) {
              db.createObjectStore("meta", { keyPath: "key" });
            }
          };
          request.onsuccess = () => {
            const db = request.result;
            db.onversionchange = () => db.close();
            resolve(db);
          };
        });
      }

      async function hydrateCatalogFromDb() {
        if (!state.db) return;
        const sets = await idbGetAll("sets");
        sets.forEach((set) => mergeSet(set, false));
      }

      async function hydrateCardsFromDb() {
        if (!state.db) return;
        const cards = await idbGetAll("cards");
        cards.forEach((card) => mergeCard(card, false));
      }

      async function hydrateCollectionFromDb() {
        if (!state.db) return;
        const collection = await idbGetAll("collection");
        collection.forEach((entry) => state.collection.set(entry.cardKey, normalizeCollection(entry)));
      }

      async function loadCardsForSelectedSetFromDb() {
        if (!state.db || !state.selectedSetKey) return;
        const cards = await idbGetAllByIndex("cards", "setKey", state.selectedSetKey);
        cards.forEach((card) => mergeCard(card, false));
      }

      function idbStore(storeName, mode = "readonly") {
        const tx = state.db.transaction(storeName, mode);
        return tx.objectStore(storeName);
      }

      function idbGetAll(storeName) {
        return new Promise((resolve, reject) => {
          const request = idbStore(storeName).getAll();
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result || []);
        });
      }

      function idbGet(storeName, key) {
        if (!state.db) return Promise.resolve(null);
        return new Promise((resolve, reject) => {
          const request = idbStore(storeName).get(key);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result || null);
        });
      }

      function idbGetAllByIndex(storeName, indexName, value) {
        return new Promise((resolve, reject) => {
          const request = idbStore(storeName).index(indexName).getAll(value);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(request.result || []);
        });
      }

      function idbPut(storeName, value) {
        if (!state.db) return Promise.resolve();
        return new Promise((resolve, reject) => {
          const request = idbStore(storeName, "readwrite").put(value);
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve(value);
        });
      }

      function idbPutMany(storeName, values) {
        if (!state.db || !values.length) return Promise.resolve();
        return new Promise((resolve, reject) => {
          const tx = state.db.transaction(storeName, "readwrite");
          const store = tx.objectStore(storeName);
          values.forEach((value) => store.put(value));
          tx.onerror = () => reject(tx.error);
          tx.oncomplete = () => resolve();
        });
      }

      function idbClear(storeName) {
        if (!state.db) return Promise.resolve();
        return new Promise((resolve, reject) => {
          const request = idbStore(storeName, "readwrite").clear();
          request.onerror = () => reject(request.error);
          request.onsuccess = () => resolve();
        });
      }

      // Sync/fallback flow: render embedded fallback first, then layer cache and live TCGdex data over it.
      // A failed fetch only shows a warning; it never clears existing sidebar data or collection state.
      async function startSyncFlow(manual) {
        if (manual) {
          addNotice("Sync started. Cached and fallback sets stay visible while TCGdex updates.", "warn", 4500);
        }

        syncLanguage("en", { deepSets: true });
        syncLanguage("pt-br", { deepSets: true });
        syncLanguage("ja", { deepSets: false });
      }

      async function syncLanguage(lang, options) {
        const sync = state.syncState[lang];
        if (sync.status === "syncing") return;
        setSyncStatus(lang, "syncing", "Syncing");

        try {
          const seriesMap = await fetchSeriesMap(lang);
          const setBriefs = await fetchTcgdexJson(lang, "sets");
          const normalizedSets = setBriefs.map((raw, index) => normalizeSetRecord(raw, lang, seriesMap, index + 1));
          normalizedSets.forEach((set) => mergeSet(set, true));
          await idbPutMany("sets", normalizedSets);
          renderSidebar();
          renderHero();

          if (options.deepSets) {
            await syncSetDetails(lang, normalizedSets, seriesMap);
          }

          setSyncStatus(lang, "ready", "Ready");
          renderAll();
        } catch (error) {
          setSyncStatus(lang, "error", "Offline");
          addNotice(`${LANGUAGES[lang].label} could not sync from TCGdex. Existing local data is still available.`, "error");
          console.warn("TCGdex sync failed:", lang, error);
          renderAll();
        }
      }

      async function fetchSeriesMap(lang) {
        try {
          const series = await fetchTcgdexJson(lang, "series");
          const map = new Map();
          series.forEach((item) => {
            if (item && item.id) {
              map.set(item.id, {
                id: item.id,
                name: item.name || item.id,
                logo: item.logo || ""
              });
            }
          });
          return map;
        } catch (error) {
          console.warn("Series list unavailable:", lang, error);
          return new Map();
        }
      }

      async function syncSetDetails(lang, sets, seriesMap) {
        let completed = 0;
        await mapLimit(sets, 6, async (set) => {
          try {
            const detail = await fetchTcgdexJson(lang, `sets/${encodeURIComponent(set.id)}`);
            const normalizedSet = normalizeSetRecord(detail, lang, seriesMap);
            normalizedSet.tcgdexOrder = set.tcgdexOrder || normalizedSet.tcgdexOrder;
            const cards = normalizeCardsFromSetDetail(detail, lang, normalizedSet.id);
            normalizedSet.cardCount = normalizedSet.cardCount || cards.length;
            normalizedSet.cardsLoadedAt = new Date().toISOString();
            mergeSet(normalizedSet, true);
            const mergedCards = cards.map((card) => mergeCard(card)).filter(Boolean);
            await Promise.all([
              idbPut("sets", normalizedSet),
              idbPutMany("cards", mergedCards)
            ]);
          } catch (error) {
            if (isTcgdexNotFoundError(error)) {
              const unavailableSet = {
                ...set,
                cardsLoadedAt: new Date().toISOString()
              };
              mergeSet(unavailableSet, true);
              await idbPut("sets", unavailableSet);
            }
            console.warn("Set detail sync skipped:", lang, set.id, error);
          } finally {
            completed += 1;
            if (completed % 12 === 0 || completed === sets.length) {
              setSyncStatus(lang, "syncing", `${completed}/${sets.length}`);
              renderSidebar();
              if (state.selectedSetKey && state.selectedSetKey.startsWith(`${lang}:`)) {
                renderHero();
                renderAlbum();
              }
            }
          }
        });
      }

      async function selectSet(setKey, options = {}) {
        if (!setKey || !state.sets.has(setKey)) return;
        const set = state.sets.get(setKey);
        if (isConfirmedEmptySet(set)) {
          addNotice(`${set.name} has no card data available in TCGdex yet.`, "warn", 3500);
          renderSidebar();
          return;
        }
        state.selectedSetKey = setKey;
        state.activeLang = set.lang || state.activeLang;
        state.missingSet = null;
        state.homePage = 1;
        ensureExpandedForSelectedSet();
        setSidebarOpen(false);
        renderAll();

        try {
          await loadCardsForSelectedSetFromDb();
          renderHero();
          renderAlbum();
        } catch (error) {
          console.warn("Card cache load failed:", error);
        }

        if (!options.skipFetch) {
          fetchSetAndCardDetails(set).catch((error) => {
            addNotice(`Could not load ${set.name} cards from TCGdex. Cached cards remain visible.`, "error");
            console.warn("Selected set load failed:", error);
            state.loadingSets.delete(setKey);
            renderAlbum();
          });
        }
      }

      function selectHome() {
        state.selectedSetKey = "home";
        state.missingSet = null;
        state.homePage = 1;
        setSidebarOpen(false);
        renderAll();
      }

      function selectSeriesPage(seriesKey) {
        const parsed = parseSeriesPageKey(seriesKey);
        if (!parsed) return;
        state.selectedSetKey = makeSeriesPageKey(parsed.lang, parsed.seriesId);
        state.activeLang = parsed.lang;
        state.missingSet = null;
        state.expandedLangs.add(parsed.lang);
        state.expandedSeries.add(`${parsed.lang}:${parsed.seriesId}`);
        setSidebarOpen(false);
        renderAll();
      }

      function selectTrophyRoom() {
        state.selectedSetKey = "trophies";
        state.missingSet = null;
        setSidebarOpen(false);
        renderAll();
      }

      function switchLanguage(lang) {
        if (!LANGUAGES[lang]) return;
        const previousSet = state.sets.get(state.selectedSetKey);
        state.activeLang = lang;
        state.expandedLangs.add(lang);
        state.homePage = 1;

        if (previousSet) {
          const equivalent = findEquivalentSet(previousSet, lang);
          if (equivalent && !isConfirmedEmptySet(equivalent)) {
            selectSet(equivalent.key);
            return;
          }
          selectMissingSet(lang, previousSet);
          return;
        }

        if (isSeriesPageKey(state.selectedSetKey)) {
          const parsed = parseSeriesPageKey(state.selectedSetKey);
          state.selectedSetKey = makeSeriesPageKey(lang, parsed?.seriesId || "other");
        } else if (isMissingSetPageKey(state.selectedSetKey) && state.missingSet?.sourceSet) {
          const equivalent = findEquivalentSet(state.missingSet.sourceSet, lang);
          if (equivalent && !isConfirmedEmptySet(equivalent)) {
            selectSet(equivalent.key);
            return;
          }
          state.missingSet = {
            targetLang: lang,
            sourceSet: state.missingSet.sourceSet
          };
        }

        renderAll();
      }

      function findEquivalentSet(sourceSet, targetLang) {
        if (!sourceSet || !targetLang) return null;
        const sameId = state.sets.get(makeSetKey(targetLang, sourceSet.id));
        if (sameId) return sameId;

        const candidates = Array.from(state.sets.values()).filter((set) => set.lang === targetLang);
        return candidates.find((set) =>
          set.seriesId === sourceSet.seriesId &&
          set.releaseDate &&
          sourceSet.releaseDate &&
          set.releaseDate === sourceSet.releaseDate
        ) || candidates.find((set) =>
          set.seriesId === sourceSet.seriesId &&
          getPrintedBaseTotal(set) &&
          getPrintedBaseTotal(set) === getPrintedBaseTotal(sourceSet) &&
          Math.abs(dateValue(set.releaseDate) - dateValue(sourceSet.releaseDate)) < 1000 * 60 * 60 * 24 * 14
        ) || null;
      }

      function selectMissingSet(targetLang, sourceSet) {
        state.selectedSetKey = makeMissingSetPageKey(targetLang, sourceSet?.id || "unknown");
        state.activeLang = targetLang;
        state.missingSet = { targetLang, sourceSet };
        state.expandedLangs.add(targetLang);
        setSidebarOpen(false);
        renderAll();
      }

      function buyFilteredCards() {
        if (state.selectedSetKey === "home" || state.selectedSetKey === "trophies" || isSeriesPageKey(state.selectedSetKey) || isMissingSetPageKey(state.selectedSetKey)) {
          addNotice("Choose a set before adding filtered cards.", "error", 3000);
          return;
        }
        const variants = getActiveCartVariants();
        const cards = getVisibleCards(getCardsForSet(state.selectedSetKey));
        if (!cards.length) {
          addNotice("No cards in the current filter to add.", "error", 3000);
          return;
        }
        let added = 0;
        cards.forEach((card) => {
          variants.forEach((variant) => {
            if (!getVariantKeys(card).includes(variant)) return;
            addToCart(card.key, variant, { silent: true });
            added += 1;
          });
        });
        renderCart();
        addNotice(`${added} filtered items added to the cart.`, "warn", 3500);
      }

      function getActiveCartVariants() {
        return ["normal", "holo", "reverse"].filter((variant) => state.variantFilters.has(variant));
      }

      async function fetchSetAndCardDetails(set) {
        const setKey = set.key;
        if (state.loadingSets.has(setKey)) return;
        state.loadingSets.add(setKey);
        renderAlbum();

        try {
          const seriesMap = await fetchSeriesMap(set.lang);
          const detail = await fetchTcgdexJson(set.lang, `sets/${encodeURIComponent(set.id)}`);
          const normalizedSet = normalizeSetRecord(detail, set.lang, seriesMap);
          normalizedSet.tcgdexOrder = set.tcgdexOrder || normalizedSet.tcgdexOrder;
          const cards = normalizeCardsFromSetDetail(detail, set.lang, normalizedSet.id);
          normalizedSet.cardCount = normalizedSet.cardCount || cards.length;
          normalizedSet.cardsLoadedAt = new Date().toISOString();
          mergeSet(normalizedSet, true);
          const mergedCards = cards.map((card) => mergeCard(card)).filter(Boolean);
          await Promise.all([
            idbPut("sets", normalizedSet),
            idbPutMany("cards", mergedCards)
          ]);
          renderAll();
          syncCardDetailsForSet(normalizedSet.key);
        } catch (error) {
          if (isTcgdexNotFoundError(error)) {
            const unavailableSet = {
              ...set,
              cardsLoadedAt: new Date().toISOString()
            };
            mergeSet(unavailableSet, true);
            await idbPut("sets", unavailableSet);
            renderAll();
          }
          throw error;
        } finally {
          state.loadingSets.delete(setKey);
          renderAlbum();
        }
      }

      async function syncCardDetailsForSet(setKey) {
        if (state.syncingCardDetails.has(setKey)) return;
        const set = state.sets.get(setKey);
        if (!set) return;
        const cards = getCardsForSet(setKey);
        if (!cards.length) return;
        const needsDetail = cards.filter((card) =>
          !card.variantsKnown ||
          !card.rarity ||
          !card.illustrator ||
          (!TCGDEX_ASSET_HOST_ENABLED && !getTcgplayerProductId(card))
        );
        if (!needsDetail.length) return;

        state.syncingCardDetails.add(setKey);
        let completed = 0;
        await mapLimit(needsDetail, 8, async (card) => {
          try {
            const detail = await fetchCardDetail(card);
            if (!detail) return;
            const normalized = normalizeCardRecord(detail, card.lang, card.setId);
            const merged = mergeCard(normalized);
            await idbPut("cards", merged);
          } catch (error) {
            console.warn("Card detail skipped:", card.key, error);
          } finally {
            completed += 1;
            if (completed % 16 === 0 || completed === needsDetail.length) {
              renderAlbum();
            }
          }
        });
        state.syncingCardDetails.delete(setKey);
        renderAll();
      }

      async function fetchCardDetail(card) {
        try {
          return await fetchTcgdexJson(card.lang, `cards/${encodeURIComponent(card.id)}`);
        } catch (error) {
          const localId = encodeURIComponent(card.localId || card.id);
          try {
            return await fetchTcgdexJson(card.lang, `sets/${encodeURIComponent(card.setId)}/${localId}`);
          } catch (fallbackError) {
            throw error;
          }
        }
      }

      // TCGdex API handling: all live reads pass through this wrapper so failed requests time out,
      // surface as warnings, and never replace existing catalog data with empty arrays.
      async function fetchTcgdexJson(lang, path) {
        const apiLang = getApiLanguage(lang);
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), 20000);
        try {
          const response = await fetch(`${API_BASE}/${apiLang}/${path}`, {
            signal: controller.signal,
            headers: { Accept: "application/json" }
          });
          if (!response.ok) {
            throw new Error(`TCGdex ${response.status} for ${apiLang}/${path}`);
          }
          return await response.json();
        } finally {
          window.clearTimeout(timeout);
        }
      }

      function getApiLanguage(lang) {
        return API_LANGUAGE[lang] || lang;
      }

      function isTcgdexNotFoundError(error) {
        return /TCGdex 404/.test(String(error?.message || error || ""));
      }

      function normalizeSetRecord(raw, lang, seriesMap = new Map(), tcgdexOrder = 0) {
        const id = String(raw.id || "").trim();
        const inferredSeriesId = raw.serie?.id || raw.series?.id || raw.serieId || inferSeriesId(raw.logo || raw.symbol || "");
        const seriesLookup = inferredSeriesId ? seriesMap.get(inferredSeriesId) : null;
        const seriesName = raw.serie?.name || raw.series?.name || raw.serie || raw.series || seriesLookup?.name || "Other";
        const cardCount = raw.cardCount?.total || raw.cardCount?.official || raw.cardCount || raw.total || raw.cards?.length || 0;
        return {
          key: makeSetKey(lang, id),
          id,
          lang,
          apiLang: raw.apiLang || getApiLanguage(lang),
          name: raw.name || id,
          series: seriesName || "Other",
          seriesId: inferredSeriesId || slugify(seriesName || "Other"),
          seriesKey: `${lang}:${inferredSeriesId || slugify(seriesName || "Other")}`,
          releaseDate: normalizeDate(raw.releaseDate || raw.release_date || raw.date),
          cardCount: Number(cardCount) || 0,
          officialCardCount: Number(raw.cardCount?.official || raw.officialCardCount || 0) || 0,
          variantCounts: normalizeSetVariantCounts(raw.cardCount),
          tcgdexOrder: Number(raw.tcgdexOrder ?? tcgdexOrder) || 0,
          logo: raw.logo || "",
          symbol: raw.symbol || "",
          fallback: Boolean(raw.fallback),
          syncedAt: raw.syncedAt || new Date().toISOString(),
          cardsLoadedAt: raw.cardsLoadedAt || ""
        };
      }

      function normalizeCardsFromSetDetail(setDetail, lang, setId) {
        const cards = Array.isArray(setDetail.cards) ? setDetail.cards : [];
        return cards.map((card) => normalizeCardRecord(card, lang, setId, setDetail));
      }

      function normalizeCardRecord(raw, lang, setId, setContext = null) {
        const id = String(raw.id || raw.cardId || "").trim();
        const normalizedSetId = setId || raw.set?.id || inferSetIdFromCardId(id);
        const variantsKnown = raw.variants && typeof raw.variants === "object";
        const baseVariants = normalizeVariants(raw.variants);
        const inferred = inferPhysicalVariants(raw, lang, normalizedSetId, setContext, baseVariants, variantsKnown);
        return {
          key: makeCardKey(lang, id),
          cardKey: makeCardKey(lang, id),
          id,
          lang,
          apiLang: raw.apiLang || getApiLanguage(lang),
          setId: normalizedSetId,
          setKey: makeSetKey(lang, normalizedSetId),
          localId: String(raw.localId || raw.localID || raw.number || raw.id?.split("-").pop() || "").padStart(0, "0"),
          name: raw.name || id,
          image: raw.image || "",
          rarity: raw.rarity || "",
          illustrator: raw.illustrator || raw.artist || "",
          variants: inferred.variants,
          variantsKnown,
          variantsInferred: inferred.inferred,
          category: raw.category || raw.type || "",
          types: normalizeTypes(raw.types || raw.energyType || []),
          syncedAt: raw.syncedAt || new Date().toISOString(),
          raw
        };
      }

      function normalizeCollection(entry) {
        return {
          cardKey: entry.cardKey,
          normalQty: Math.max(0, Number(entry.normalQty || 0)),
          holoQty: Math.max(0, Number(entry.holoQty || 0)),
          reverseQty: Math.max(0, Number(entry.reverseQty || 0)),
          condition: entry.condition || "",
          paidPrice: Number(entry.paidPrice || 0) || 0,
          brPrice: Number(entry.brPrice || 0) || 0,
          normalPrice: Number(entry.normalPrice || 0) || 0,
          holoPrice: Number(entry.holoPrice || 0) || 0,
          reversePrice: Number(entry.reversePrice || 0) || 0,
          ligaUrl: entry.ligaUrl || "",
          notes: entry.notes || "",
          updatedAt: entry.updatedAt || ""
        };
      }

      function normalizeVariants(variants) {
        if (!variants || typeof variants !== "object") {
          return { normal: true };
        }
        return {
          normal: Boolean(variants.normal),
          holo: Boolean(variants.holo),
          reverse: Boolean(variants.reverse)
        };
      }

      function normalizeSetVariantCounts(cardCount) {
        if (!cardCount || typeof cardCount !== "object") {
          return { normal: 0, holo: 0, reverse: 0 };
        }
        return {
          normal: Number(cardCount.normal || 0) || 0,
          holo: Number(cardCount.holo || 0) || 0,
          reverse: Number(cardCount.reverse || 0) || 0
        };
      }

      function normalizeTypes(types) {
        const values = Array.isArray(types) ? types : [types];
        return Array.from(new Set(values.map(normalizeTypeName).filter(Boolean)));
      }

      function normalizeTypeName(type) {
        const text = normalizeSearch(type || "");
        if (!text) return "";
        if (/(grass|planta|grama)/.test(text)) return "Grass";
        if (/(fire|fogo)/.test(text)) return "Fire";
        if (/(water|agua)/.test(text)) return "Water";
        if (/(lightning|electric|eletrico|relampago|raio)/.test(text)) return "Lightning";
        if (/(psychic|psiquico|psiquica)/.test(text)) return "Psychic";
        if (/(fighting|lutador|luta)/.test(text)) return "Fighting";
        if (/(darkness|dark|sombrio|escuridao|noturno)/.test(text)) return "Darkness";
        if (/(metal|steel|aco)/.test(text)) return "Metal";
        if (/(dragon|dragao)/.test(text)) return "Dragon";
        if (/(colorless|incolor|normal)/.test(text)) return "Colorless";
        if (/(fairy|fada)/.test(text)) return "Fairy";
        return "";
      }

      function inferPhysicalVariants(raw, lang, setId, setContext, baseVariants, variantsKnown) {
        const variants = { ...baseVariants };
        let inferred = false;
        const set = state.sets.get(makeSetKey(lang, setId));
        const seriesId = setContext?.serie?.id || setContext?.series?.id || set?.seriesId || inferSeriesId(raw.image || "");
        const isPocket = seriesId === "tcgp" || String(raw.image || "").includes("/tcgp/");
        if (isPocket) {
          return { variants, inferred };
        }

        const contextSet = {
          key: makeSetKey(lang, setId),
          id: setId,
          lang,
          officialCardCount: Number(setContext?.cardCount?.official || set?.officialCardCount || 0) || 0,
          cardCount: Number(setContext?.cardCount?.total || set?.cardCount || 0) || 0
        };
        const officialCount = getPrintedBaseTotal(contextSet);
        const localNumber = Number(String(raw.localId || raw.localID || raw.number || "").replace(/\D/g, "")) || 0;
        const rarity = normalizeSearch(raw.rarity || "");
        const shouldInferReverse = supportsLikelyReverse(rarity, localNumber, officialCount, variantsKnown);
        const shouldInferHolo = supportsLikelyHolo(rarity);

        if (shouldInferReverse && !variants.reverse) {
          variants.reverse = true;
          inferred = true;
        }
        if (shouldInferHolo && !variants.holo) {
          variants.holo = true;
          inferred = true;
        }
        if (!variants.normal && !variants.holo && !variants.reverse) {
          variants.normal = true;
          inferred = true;
        }

        const resolved = resolvePhysicalVariantSlots(variants, raw);
        inferred = inferred || resolved.normal !== Boolean(variants.normal) || resolved.holo !== Boolean(variants.holo) || resolved.reverse !== Boolean(variants.reverse);
        return { variants: resolved, inferred };
      }

      function supportsLikelyReverse(rarity, localNumber, officialCount, variantsKnown) {
        if (!rarity && variantsKnown) return false;
        const looksSecret = rarity && /(illustration|ultra|hyper|secret|rainbow|gold|radiant|amazing|shiny|promo|double rare|rare ultra|rare secret|rara ultra|rara secreta|rara ilustracao|ilustracao especial|hiper rara)/.test(rarity);
        if (looksSecret) return false;
        const regularRarity = !rarity || /(common|uncommon|rare|holo|comum|incomum|rara|raro)/.test(rarity);
        if (!regularRarity) return false;
        if (officialCount && localNumber && localNumber > officialCount) return false;
        return true;
      }

      function supportsLikelyHolo(rarity) {
        if (!rarity) return false;
        return /(holo|holograf|holographic|rare|rara|raro|double|ultra|secret|secreta|hyper|hiper|rainbow|gold|illustration|ilustracao)/.test(rarity) && !/(reverse|reversa)/.test(rarity);
      }

      function resolvePhysicalVariantSlots(variants, source = {}) {
        const sourceVariants = {
          normal: Boolean(variants?.normal),
          holo: Boolean(variants?.holo),
          reverse: Boolean(variants?.reverse)
        };
        const rarity = normalizeSearch(source.rarity || source.raw?.rarity || "");
        if (/(double rare|rara dupla|raro duplo)/.test(rarity)) {
          return { normal: false, holo: true, reverse: false };
        }
        if (/(common|uncommon|comum|incomum)/.test(rarity)) {
          return { normal: true, holo: false, reverse: true };
        }
        if (/^(rare|rara|raro|rare holo|rara holo|raro holo)$/.test(rarity)) {
          return { normal: false, holo: true, reverse: true };
        }

        const knownVariantCount = Object.values(sourceVariants).filter(Boolean).length;
        const variantsKnown = source.variantsKnown !== false && Boolean(source.variants || source.raw?.variants);
        if (variantsKnown && knownVariantCount > 0 && knownVariantCount <= 2) {
          return sourceVariants;
        }

        const primaryIsHolo = shouldUseHoloPrimary(source, sourceVariants);
        return primaryIsHolo
          ? { normal: false, holo: true, reverse: true }
          : { normal: true, holo: false, reverse: true };
      }

      function shouldUseHoloPrimary(source = {}, variants = {}) {
        const rarity = normalizeSearch(source.rarity || source.raw?.rarity || "");
        const name = normalizeSearch(source.name || source.raw?.name || "");
        if (variants.holo && !variants.normal) return true;
        if (/(holo|holograf|holographic|rare holo|rara holo|raro holo)/.test(rarity)) return true;
        if (/(double|ultra|secret|secreta|hyper|hiper|rainbow|gold|illustration|ilustracao|special illustration|ex|vmax|vstar|gx)/.test(rarity)) return true;
        if (/(^|\s)(ex|vmax|vstar|gx)(\s|$)/.test(name)) return true;
        if (/(^|\s)(rare|rara|raro)(\s|$)/.test(rarity) && !/(common|uncommon|comum|incomum)/.test(rarity)) return true;
        return false;
      }

      function mergeSet(incoming, allowPersistedFields) {
        if (!incoming || !incoming.id || !incoming.lang) return;
        const current = state.sets.get(incoming.key);
        if (!current) {
          state.sets.set(incoming.key, incoming);
          return;
        }
        const merged = { ...current };
        Object.entries(incoming).forEach(([key, value]) => {
          if (key === "tcgdexOrder" && !Number(value) && Number(current.tcgdexOrder)) {
            return;
          }
          const hasValue = value !== undefined && value !== null && value !== "";
          if (hasValue || key === "cardCount" || key === "officialCardCount" || key === "fallback") {
            merged[key] = value;
          }
        });
        merged.fallback = Boolean(current.fallback && incoming.fallback);
        if (allowPersistedFields && current.cardsLoadedAt && !incoming.cardsLoadedAt) {
          merged.cardsLoadedAt = current.cardsLoadedAt;
        }
        state.sets.set(incoming.key, merged);
      }

      function mergeCard(incoming) {
        if (!incoming || !incoming.id || !incoming.lang || !incoming.setId) return;
        const bucket = ensureCardBucket(incoming.setKey);
        const current = bucket.get(incoming.key);
        if (!current) {
