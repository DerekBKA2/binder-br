          bucket.set(incoming.key, incoming);
          return incoming;
        }
        const merged = { ...current };
        Object.entries(incoming).forEach(([key, value]) => {
          if (key === "raw" || key === "variants" || key === "variantsKnown") return;
          const hasValue = value !== undefined && value !== null && value !== "";
          if (hasValue) merged[key] = value;
        });
        const currentRawScore = getCardRawDetailScore(current.raw);
        const incomingRawScore = getCardRawDetailScore(incoming.raw);
        merged.raw = incomingRawScore >= currentRawScore ? incoming.raw : current.raw;
        if (incoming.variantsKnown || !current.variantsKnown) {
          merged.variants = incoming.variants;
          merged.variantsKnown = Boolean(incoming.variantsKnown);
        } else {
          merged.variants = current.variants;
          merged.variantsKnown = true;
        }
        bucket.set(incoming.key, merged);
        return merged;
      }

      function getCardRawDetailScore(raw) {
        if (!raw || typeof raw !== "object") return 0;
        let score = Object.keys(raw).length;
        if (raw.variants) score += 20;
        if (raw.rarity) score += 10;
        if (raw.illustrator) score += 10;
        if (raw.category) score += 10;
        if (raw.pricing?.tcgplayer) score += 100;
        return score;
      }

      function ensureCardBucket(setKey) {
        if (!state.cardsBySet.has(setKey)) {
          state.cardsBySet.set(setKey, new Map());
        }
        return state.cardsBySet.get(setKey);
      }

      function getCardsForSet(setKey) {
        return Array.from((state.cardsBySet.get(setKey) || new Map()).values());
      }

      function isConfirmedEmptySet(set) {
        return Boolean(set?.cardsLoadedAt && !getCardsForSet(set.key).length && !state.loadingSets.has(set.key));
      }

      function isSetVisibleInLibrary(set) {
        if (!set || !set.id) return false;
        return !isConfirmedEmptySet(set);
      }

      function getAllCards() {
        return Array.from(state.cardsBySet.values()).flatMap((bucket) => Array.from(bucket.values()));
      }

      function getHomeCards(lang = state.activeLang) {
        return getAllCards().filter((card) => card.lang === lang);
      }

      function getActiveCards() {
        if (state.selectedSetKey === "home") return getHomeCards();
        if (state.selectedSetKey === "trophies") return [];
        if (isMissingSetPageKey(state.selectedSetKey)) return [];
        return getCardsForSet(state.selectedSetKey);
      }

      // Image URL normalization: TCGdex card art often omits a file extension.
      // Extensionless card images become /low.webp for grid art and /high.webp when needed later.
      function normalizeCardImageUrl(url, size = "low") {
        if (!url) return "";
        const trimmed = String(url).trim();
        if (!trimmed) return "";
        if (CARD_IMAGE_EXT.test(trimmed)) return trimmed;
        return `${trimmed.replace(/\/$/, "")}/${size}.webp`;
      }

      function normalizeSetAssetUrl(url) {
        if (!url) return "";
        const trimmed = String(url).trim();
        if (!trimmed) return "";
        if (CARD_IMAGE_EXT.test(trimmed)) return trimmed;
        return `${trimmed}.webp`;
      }

      function makeImageProxyUrl(url) {
        if (!url || !/^https:\/\/assets\.tcgdex\.net\//i.test(url)) return "";
        return `https://images.weserv.nl/?url=${encodeURIComponent(url)}&output=webp`;
      }

      function orderImageCandidates(urls) {
        if (!TCGDEX_ASSET_HOST_ENABLED) return [];
        const direct = Array.from(new Set(urls.filter(Boolean)));
        const proxied = direct.map(makeImageProxyUrl).filter(Boolean);
        const published = location.hostname.endsWith("github.io");
        return Array.from(new Set(published ? [...proxied, ...direct] : [...direct, ...proxied]));
      }

      function getTcgplayerProductId(card) {
        const pricing = card?.raw?.pricing?.tcgplayer;
        if (!pricing || typeof pricing !== "object") return "";
        for (const value of Object.values(pricing)) {
          if (!value || typeof value !== "object") continue;
          const productId = value.productId || value.productID || value.idProduct;
          if (productId) return String(productId);
        }
        return "";
      }

      function getTcgplayerImageUrl(card, size = "low") {
        const productId = getTcgplayerProductId(card);
        if (!productId) return "";
        const dimensions = size === "high" ? "1000x1000" : "800x800";
        return `https://tcgplayer-cdn.tcgplayer.com/product/${encodeURIComponent(productId)}_in_${dimensions}.jpg`;
      }

      function getPokemonTcgCardImageUrl(card, size = "low") {
        const setId = getPokemonTcgSetId(card?.setId);
        const rawLocalId = String(card?.localId || "").trim();
        if (!setId || !rawLocalId) return "";
        const localId = /^\d+$/.test(rawLocalId) ? String(Number(rawLocalId)) : rawLocalId;
        const suffix = size === "high" ? "_hires" : "";
        return `https://images.pokemontcg.io/${encodeURIComponent(setId)}/${encodeURIComponent(localId)}${suffix}.png`;
      }

      function getCardImageCandidates(card, size = "low") {
        if (!card) return [];
        const tcgplayer = getTcgplayerImageUrl(card, size);
        const pokemonTcg = getPokemonTcgCardImageUrl(card, size);
        const stable = Array.from(new Set([tcgplayer, pokemonTcg].filter(Boolean)));
        if (!TCGDEX_ASSET_HOST_ENABLED) return stable;
        const direct = normalizeCardImageUrl(card.image, size);
        const alternateSize = size === "high" ? normalizeCardImageUrl(card.image, "low") : "";
        return Array.from(new Set([...stable, ...orderImageCandidates([direct, alternateSize])]));
      }

      function renderCardImage(card, size = "low", loading = "lazy") {
        const candidates = getCardImageCandidates(card, size);
        if (!candidates.length) return "";
        const fallbackAttr = candidates.length > 1
          ? ` data-fallback-srcs="${escapeAttr(candidates.slice(1).join("|"))}"`
          : "";
        const loadingAttr = loading ? ` loading="${escapeAttr(loading)}"` : "";
        return `<img src="${escapeAttr(candidates[0])}" alt="${escapeAttr(card.name)}" referrerpolicy="no-referrer"${loadingAttr}${fallbackAttr}>`;
      }

      function getPokemonTcgSetId(setId) {
        const id = String(setId || "").trim().toLowerCase();
        if (!id) return "";
        const exact = {
          "me02.5": "me2pt5",
          "sv03.5": "sv3pt5",
          "sv04.5": "sv4pt5",
          "sv06.5": "sv6pt5",
          "sv08.5": "sv8pt5"
        };
        if (exact[id]) return exact[id];
        return id.replace(/^([a-z]+)0+(\d)/, "$1$2").replace(/\.(\d+)$/, "pt$1");
      }

      function getSetAssetCandidates(set) {
        if (!set) return [];
        const stableValues = [];
        const tcgdexValues = [];
        const addTo = (target, value) => {
          if (Array.isArray(value)) {
            value.forEach((item) => addTo(target, item));
            return;
          }
          if (value) target.push(value);
        };
        const seriesId = set.seriesId || inferSeriesId(set.logo || set.symbol || "");
        const normalizedSetId = String(set.id || "").toLowerCase();
        const pokemonTcgSetId = getPokemonTcgSetId(normalizedSetId);

        // Set logos use independent fallbacks so disabling a broken TCGdex asset host
        // never removes logos from headers, series pages, or the trophy room.
        addTo(stableValues, PKMN_GG_SET_LOGOS[normalizedSetId]);
        addTo(stableValues, getNamedLogoFallbacks(set));
        if (pokemonTcgSetId) {
          addTo(stableValues, `https://images.pokemontcg.io/${pokemonTcgSetId}/logo.png`);
        }

        addTo(tcgdexValues, set.logo);
        if (seriesId && set.id) {
          addTo(tcgdexValues, `https://assets.tcgdex.net/${getApiLanguage(set.lang)}/${seriesId}/${set.id}/logo`);
          if (set.lang !== "en") {
            addTo(tcgdexValues, `https://assets.tcgdex.net/en/${seriesId}/${set.id}/logo`);
          }
        }
        addTo(tcgdexValues, set.symbol);
        if (seriesId && set.id) {
          addTo(tcgdexValues, `https://assets.tcgdex.net/univ/${seriesId}/${set.id}/symbol`);
        }
        const stable = stableValues.map(normalizeSetAssetUrl).filter(Boolean);
        const tcgdex = orderImageCandidates(tcgdexValues.map(normalizeSetAssetUrl).filter(Boolean));
        return Array.from(new Set([...stable, ...tcgdex]));
      }

      function getNamedLogoFallbacks(set) {
        if (!set) return [];
        return [
          SET_LOGO_FALLBACKS[set.key],
          SET_LOGO_FALLBACKS[`${set.lang}:${slugify(set.name || "")}`]
        ].filter(Boolean).flat();
      }

      function renderSetLogoImage(set, altText = "", loading = "") {
        const candidates = getSetAssetCandidates(set);
        const fallbackText = (set?.name || "??").slice(0, 2).toUpperCase();
        if (!candidates.length) {
          return `<span>${escapeHtml(fallbackText)}</span>`;
        }
        const fallbackAttr = candidates.length > 1
          ? ` data-fallback-srcs="${escapeAttr(candidates.slice(1).join("|"))}"`
          : "";
        const loadingAttr = loading ? ` loading="${escapeAttr(loading)}"` : "";
        return `<img src="${escapeAttr(candidates[0])}" alt="${escapeAttr(altText)}" referrerpolicy="no-referrer"${loadingAttr}${fallbackAttr} data-logo-text="${escapeAttr(fallbackText)}">`;
      }

      function tryNextImageFallback(img) {
        const raw = img.dataset.fallbackSrcs || "";
        if (!raw) return false;
        const candidates = raw.split("|").filter(Boolean);
        const next = candidates.shift();
        if (!next) return false;
        img.dataset.fallbackSrcs = candidates.join("|");
        img.src = next;
        return true;
      }

      // Variant handling: common/uncommon cards use normal + reverse, rare cards use
      // holo + reverse, and double rares use only holo. Other known TCGdex variants are preserved.
      function getVariantKeys(card) {
        const variants = resolvePhysicalVariantSlots(card.variants || {}, card);
        return ["normal", "holo", "reverse"].filter((key) => variants[key]);
      }

      function getCollection(cardKey) {
        if (!state.collection.has(cardKey)) {
          state.collection.set(cardKey, normalizeCollection({ cardKey }));
        }
        return state.collection.get(cardKey);
      }

      function getTotalQuantity(cardKey) {
        const entry = getCollection(cardKey);
        return entry.normalQty + entry.holoQty + entry.reverseQty;
      }

      async function updateVariantQuantity(cardKey, variant, delta) {
        const entry = getCollection(cardKey);
        const field = `${variant}Qty`;
        const nextValue = Math.max(0, Number(entry[field] || 0) + delta);
        entry[field] = nextValue;
        entry.updatedAt = new Date().toISOString();
        state.collection.set(cardKey, entry);
        try {
          await idbPut("collection", entry);
        } catch (error) {
          addNotice("Collection change stayed in memory because IndexedDB could not save it.", "error");
          console.warn("Collection save failed:", error);
        }
        renderHero();
        renderSidebar();
        renderControls();
        renderAlbum();
        renderCardPreview();
        scheduleCloudSync();
      }

      async function saveVariantPrice(cardKey, variant, value) {
        const entry = getCollection(cardKey);
        const numeric = parseBrazilianPrice(value);
        entry[`${variant}Price`] = numeric;
        entry.updatedAt = new Date().toISOString();
        state.collection.set(cardKey, entry);
        try {
          await idbPut("collection", entry);
        } catch (error) {
          console.warn("Price save failed:", error);
        }
        renderHero();
        renderAlbum();
        renderCart();
        renderCardPreview();
        scheduleCloudSync();
      }

      function renderAll() {
        renderSyncPill();
        renderCloudButton();
        renderNotices();
        renderSidebar();
        renderHero();
        renderControls();
        renderAlbum();
        renderCart();
        renderCardPreview();
      }

      function renderSyncPill() {
        const syncing = Object.values(state.syncState).some((item) => item.status === "syncing");
        const ready = Object.values(state.syncState).some((item) => item.status === "ready");
        els.syncPill.classList.toggle("syncing", syncing);
        els.syncPill.classList.toggle("ready", ready && !syncing);
        if (syncing) {
          const active = Object.values(state.syncState).find((item) => item.status === "syncing");
          els.syncPill.textContent = active?.label || "Syncing";
        } else if (ready) {
          els.syncPill.textContent = "Ready";
        } else {
          els.syncPill.textContent = "Fallback";
        }
      }

      function renderCloudButton() {
        const connected = hasCloudToken();
        els.cloudBtn.classList.toggle("connected", connected);
        els.cloudBtn.textContent = state.cloud.status === "syncing" ? "Drive..." : "Drive";
        els.cloudBtn.title = connected
          ? `Google Drive connected${state.cloud.lastSyncAt ? ` - last sync ${formatCloudTime(state.cloud.lastSyncAt)}` : ""}`
          : "Google Drive sync";
      }

      function renderNotices() {
        els.noticeStack.innerHTML = state.notices.map((notice) => `
          <div class="notice ${notice.type === "error" ? "error" : ""}" data-notice="${escapeAttr(notice.id)}">
            <span>${escapeHtml(notice.message)}</span>
            <button type="button" data-dismiss-notice="${escapeAttr(notice.id)}">Dismiss</button>
          </div>
        `).join("");

        els.noticeStack.querySelectorAll("[data-dismiss-notice]").forEach((button) => {
          button.addEventListener("click", () => {
            state.notices = state.notices.filter((notice) => notice.id !== button.dataset.dismissNotice);
            renderNotices();
          });
        });
      }

      function renderSidebar() {
        renderSidebarTrophySummary();
        els.trophyRoomBtn.classList.toggle("active", state.selectedSetKey === "trophies");
        els.homeBtn.classList.toggle("active", state.selectedSetKey === "home");
        els.languageTabs.querySelectorAll("[data-lang-jump]").forEach((button) => {
          button.classList.toggle("active", button.dataset.langJump === state.activeLang);
        });
        const groups = getGroupedSets(state.activeLang);
        const html = groups.length
          ? groups.map((group, index) => renderSeriesGroup(state.activeLang, group, index)).join("")
          : `<div class="empty-state">No sets loaded for ${escapeHtml(LANGUAGES[state.activeLang]?.short || state.activeLang)}.</div>`;
        els.languageTree.innerHTML = html;
      }

      function renderSidebarTrophySummary() {
        const counts = getTrophyCounts();
        const items = [
          ["copper", 1],
          ["silver", 2],
          ["gold", 3],
          ["platinum", 4]
        ];
        els.sidebarTrophySummary.innerHTML = items.map(([name, rank]) => `
          <div class="sidebar-trophy-count" title="${escapeAttr(getTrophyName(rank))}">
            ${renderTrophyIcon({ rank })}
            <span>${counts[name] || 0}</span>
          </div>
        `).join("");
      }

      function renderSeriesGroup(lang, group, index) {
        const seriesStateKey = `${lang}:${group.seriesId || slugify(group.series)}`;
        const pageKey = makeSeriesPageKey(lang, group.seriesId || slugify(group.series));
        const isOpen = state.expandedSeries.has(seriesStateKey);
        const isActive = state.selectedSetKey === pageKey;
        const setsHtml = isOpen ? group.sets.map((set) => `
          <button class="set-row ${set.key === state.selectedSetKey ? "active" : ""}" type="button" data-set-key="${escapeAttr(set.key)}" title="${escapeAttr(set.name)}">
            <span></span>
            <span class="tree-label">${escapeHtml(set.name)}</span>
            <span class="tree-count">${escapeHtml(displayYear(set.releaseDate))}</span>
          </button>
        `).join("") : "";
        return `
          <div class="series-block">
            <div class="series-header ${isActive ? "active" : ""}">
              <button class="series-toggle" type="button" data-series-toggle="${escapeAttr(seriesStateKey)}" aria-label="${isOpen ? "Collapse" : "Expand"} ${escapeAttr(group.series)}">
                <span class="chev">${isOpen ? "v" : ">"}</span>
              </button>
              <button class="series-link" type="button" data-series-open="${escapeAttr(pageKey)}" title="${escapeAttr(group.series)}">
                <span class="tree-label">${escapeHtml(group.series)}</span>
                <span class="tree-count">${group.sets.length}</span>
              </button>
            </div>
            ${setsHtml}
          </div>
        `;
      }

      function renderHero() {
        els.setHero.hidden = false;
        if (state.selectedSetKey === "home") {
          renderHomeHero();
          return;
        }
        if (state.selectedSetKey === "trophies") {
          els.setHero.innerHTML = "";
          els.setHero.hidden = true;
          return;
        }
        if (isMissingSetPageKey(state.selectedSetKey)) {
          renderMissingSetHero();
          return;
        }
        if (isSeriesPageKey(state.selectedSetKey)) {
          renderSeriesHero();
          return;
        }
        const set = state.sets.get(state.selectedSetKey);
        if (!set) {
          els.setHero.innerHTML = "";
          els.setHero.hidden = true;
          return;
        }
        const cards = getCardsForSet(set.key);
        const trophy = getSetTrophy(set, cards);
        const countLabel = `${trophy.baseTotal} base + ${trophy.secretTotal} secret`;
        const seriesPageKey = makeSeriesPageKey(set.lang, set.seriesId || slugify(set.series || "Other"));
        els.setHero.innerHTML = `
          <div class="set-title-row">
            <div class="set-mark">
              ${renderSetLogoImage(set, "")}
            </div>
            <div class="set-heading">
              <h1>${escapeHtml(set.name)}</h1>
              <div class="set-meta">
                <button class="series-inline-link" type="button" data-series-open="${escapeAttr(seriesPageKey)}">${escapeHtml(set.series || "Other")}</button>
                <span>${escapeHtml(formatDate(set.releaseDate))}</span>
                <span>${escapeHtml(countLabel)}</span>
                <span>${escapeHtml(formatLanguageLabel(set.lang))}</span>
                <a class="liga-link" href="${escapeAttr(buildLigaPokemonSetUrl(set))}" target="_blank" rel="noopener noreferrer">Liga set</a>
              </div>
              ${renderTrophyBand(trophy)}
            </div>
          </div>
        `;
      }

      function renderHomeHero() {
        const stats = getHomeStats(state.activeLang);
        const lang = LANGUAGES[state.activeLang] || LANGUAGES.en;
        const typeItems = TYPE_ORDER.map((type) => {
          const meta = TYPE_META[type];
          return `
            <div class="type-count" title="${escapeAttr(meta.label)}">
              <span class="type-icon ${escapeAttr(meta.className)}">${escapeHtml(meta.icon)}</span>
              <span>${stats.typeCounts[type] || 0}</span>
            </div>
          `;
        }).join("");
        els.setHero.innerHTML = `
          <div class="home-summary-card">
            <div class="home-summary-title">
              <span class="flag">${escapeHtml(lang.flag || "")}</span>
              <span>${escapeHtml(lang.country || lang.label)} TCG</span>
            </div>
            <div class="home-kpis">
              <div class="home-kpi">
                <span class="home-kpi-label">Total Cards</span>
                <span class="home-kpi-value">${formatNumber(stats.totalCards)}</span>
              </div>
              <div class="home-kpi">
                <span class="home-kpi-label">Unique Cards</span>
                <span class="home-kpi-value">${formatNumber(stats.uniqueCards)}</span>
              </div>
            </div>
            <div class="type-count-grid">${typeItems}</div>
          </div>
        `;
      }

      function renderMissingSetHero() {
        const sourceSet = state.missingSet?.sourceSet;
        const targetLang = state.missingSet?.targetLang || state.activeLang;
        const lang = LANGUAGES[targetLang] || { country: targetLang, flag: "" };
        els.setHero.innerHTML = `
          <div class="missing-set-panel">
            <h1>No matching set found</h1>
            <p>${escapeHtml(sourceSet?.name || "This set")} does not have a loaded ${escapeHtml(lang.country || targetLang)} version yet.</p>
          </div>
        `;
      }

      function renderSeriesHero() {
        const context = getSelectedSeriesContext();
        if (!context) {
          els.setHero.innerHTML = "";
          els.setHero.hidden = true;
          return;
        }
        els.setHero.innerHTML = `
          <div class="set-title-row series-title-row">
            <div class="set-mark image-missing"><span>${escapeHtml((context.series || "SE").slice(0, 2).toUpperCase())}</span></div>
            <div class="set-heading">
              <h1>${escapeHtml(context.series)}</h1>
              <div class="set-meta">
                <span>${escapeHtml(LANGUAGES[context.lang]?.label || context.lang)}</span>
                <span>${context.sets.length} sets</span>
                <span>${context.cards.length} cards loaded</span>
              </div>
            </div>
          </div>
        `;
      }

      function renderControls() {
        els.controlBar.hidden = state.selectedSetKey === "trophies" || isSeriesPageKey(state.selectedSetKey) || isMissingSetPageKey(state.selectedSetKey);
        if (state.selectedSetKey === "trophies" || isSeriesPageKey(state.selectedSetKey) || isMissingSetPageKey(state.selectedSetKey)) {
          return;
        }
        const cards = getActiveCards();
        const counts = getSetCounts(cards, { respectVariantFilters: true });
        const variantCounts = getVariantSupportCounts(cards);
        const secretCount = getSecretSupportCount(cards);
        const filters = [
          ["all", `Show All (${counts.totalCards})`],
          ["have", `Have (${counts.have})`],
          ["need", `Need (${counts.need})`],
          ["dupes", `Dupes (${counts.dupes})`]
        ];
        els.filterControls.innerHTML = filters.map(([value, label]) => `
          <button type="button" data-filter="${value}" class="${state.filter === value ? "active" : ""}">${escapeHtml(label)}</button>
        `).join("");
        els.variantControls.innerHTML = ["normal", "holo", "reverse"].map((variant) => `
          <button type="button"
            data-variant-filter="${variant}"
            class="${state.variantFilters.has(variant) ? "active" : ""}"
            title="${escapeAttr(VARIANT_LABELS[variant])}">
            ${escapeHtml(VARIANT_SHORT[variant])} (${variantCounts[variant] || 0})
          </button>
        `).join("") + `
          <button type="button"
            data-secret-filter="secret"
            class="${state.includeSecretCards ? "active" : ""}"
            title="Secret cards">
            Secret (${secretCount})
          </button>
        `;
        els.sortSelect.value = `${state.sort}:${state.sortDir}`;
        els.viewControls.querySelectorAll("[data-view]").forEach((button) => {
          button.classList.toggle("active", button.dataset.view === state.view);
        });
        const activeLang = state.selectedSetKey === "home" || state.selectedSetKey === "trophies" || isMissingSetPageKey(state.selectedSetKey) ? state.activeLang : state.sets.get(state.selectedSetKey)?.lang;
        els.languageTabs.querySelectorAll("[data-lang-jump]").forEach((button) => {
          button.classList.toggle("active", button.dataset.langJump === activeLang);
        });
      }

      function renderAlbum() {
        const set = state.selectedSetKey === "home" || state.selectedSetKey === "trophies" || isMissingSetPageKey(state.selectedSetKey) ? null : state.sets.get(state.selectedSetKey);
        if (state.selectedSetKey === "home") {
          renderHomeAlbum();
          return;
        }
        if (state.selectedSetKey === "trophies") {
          renderTrophyRoom();
          return;
        }
        if (isMissingSetPageKey(state.selectedSetKey)) {
          els.album.className = "album";
          els.album.innerHTML = `<div class="empty-state">Choose another language or set from the sidebar.</div>`;
          return;
        }
        if (isSeriesPageKey(state.selectedSetKey)) {
          renderSeriesAlbum();
          return;
        }
        els.album.className = `album view-${state.view}`;
        if (!set && state.selectedSetKey !== "home") {
          els.album.innerHTML = `<div class="empty-state">No set selected.</div>`;
          return;
        }

        const cards = getVisibleCards(getActiveCards());
        if (!cards.length && set && state.loadingSets.has(set.key)) {
          els.album.innerHTML = `
            <div class="skeleton-grid">
              ${Array.from({ length: 12 }, () => `<div class="skeleton"></div>`).join("")}
            </div>
          `;
          return;
        }

        if (!cards.length) {
          els.album.innerHTML = `<div class="empty-state">No cards match the current view.</div>`;
          return;
        }

        if (state.view === "table") {
          els.album.innerHTML = `<div class="table-list">${cards.map((card) => renderCardRow(card, state.sets.get(card.setKey) || set)).join("")}</div>`;
          return;
        }

        if (state.view === "binder") {
          els.album.innerHTML = renderBinderPages(cards, set);
          return;
        }

        els.album.innerHTML = cards.map((card) => renderCardTile(card, state.sets.get(card.setKey) || set)).join("");
      }

      function renderHomeAlbum() {
        const cards = getVisibleHomeCards(getHomeCards());
        const totalPages = Math.max(1, Math.ceil(cards.length / HOME_PAGE_SIZE));
        state.homePage = Math.min(Math.max(1, state.homePage), totalPages);
        const start = (state.homePage - 1) * HOME_PAGE_SIZE;
        const pageCards = cards.slice(start, start + HOME_PAGE_SIZE);
        els.album.className = `home-album view-${state.view}`;

        const pager = `
          <div class="pagination-bar">
            <span>${cards.length ? `${start + 1}-${start + pageCards.length} of ${cards.length}` : "0 cards"}</span>
            <div class="pagination-actions">
              <button type="button" data-home-page="${state.homePage - 1}" ${state.homePage <= 1 ? "disabled" : ""}>Previous</button>
              <button type="button" data-home-page="${state.homePage + 1}" ${state.homePage >= totalPages ? "disabled" : ""}>Next</button>
            </div>
          </div>
        `;

        if (!pageCards.length) {
          els.album.innerHTML = `${pager}<div class="empty-state">No cards found.</div>`;
          return;
        }

        if (state.view === "table") {
          els.album.innerHTML = `${pager}<div class="home-card-grid view-table"><div class="table-list">${pageCards.map((card) => renderCardRow(card, state.sets.get(card.setKey))).join("")}</div></div>`;
          return;
        }

        if (state.view === "binder") {
          els.album.innerHTML = `${pager}<div class="home-card-grid view-binder">${renderBinderPages(pageCards, null)}</div>`;
          return;
        }

        els.album.innerHTML = `${pager}<div class="home-card-grid">${pageCards.map((card) => renderCardTile(card, state.sets.get(card.setKey))).join("")}</div>`;
      }

      function renderTrophyRoom() {
        const groups = getTrophyRoomGroups();
        els.album.className = "trophy-room";
        if (!groups.length) {
          els.album.innerHTML = `<div class="empty-state">No loaded sets for the Trophy Room.</div>`;
          return;
        }
        els.album.innerHTML = groups.map((group) => `
          <section class="trophy-season">
            <div class="trophy-season-title">${escapeHtml(group.series)}</div>
            <div class="trophy-season-shelf">
              ${group.sets.map(({ set, trophy }) => renderTrophySlot(set, trophy)).join("")}
            </div>
          </section>
        `).join("");
      }

      function renderTrophySlot(set, trophy) {
        return `
          <button class="trophy-slot ${trophy.rank ? "" : "no-trophy"}" type="button"
            data-series-set-key="${escapeAttr(set.key)}"
            title="${escapeAttr(set.name)}"
            aria-label="Open ${escapeAttr(set.name)}">
            ${renderTrophyIcon(trophy)}
            <div class="trophy-slot-logo">
              ${renderSetLogoImage(set, set.name, "lazy")}
            </div>
            <div class="trophy-slot-date">${escapeHtml(formatMonthYear(set.releaseDate))}</div>
          </button>
        `;
      }

      function renderSeriesAlbum() {
        const context = getSelectedSeriesContext();
        els.album.className = "series-set-grid";
        if (!context || !context.sets.length) {
          els.album.innerHTML = `<div class="empty-state">No sets found for this series.</div>`;
          return;
        }
        els.album.innerHTML = context.sets.map((set) => renderSeriesSetCard(set)).join("");
      }

      function renderSeriesSetCard(set) {
        const cards = getCardsForSet(set.key);
        const trophy = getSetTrophy(set, cards);
        const countLabel = `${trophy.baseTotal} + ${trophy.secretTotal} Secret`;
        return `
          <button class="series-set-card" type="button" data-series-set-key="${escapeAttr(set.key)}" title="${escapeAttr(set.name)}">
            <div class="series-set-logo">
              ${renderSetLogoImage(set, set.name, "lazy")}
            </div>
            <div class="series-set-info">
              <div>
                <div class="series-set-name">${escapeHtml(set.name)}</div>
                <div class="series-set-meta">${escapeHtml(formatDate(set.releaseDate))} &middot; ${escapeHtml(countLabel)}</div>
              </div>
              <div class="series-progress">
                <div class="series-progress-line">
                <span>${trophy.baseOwned}/${trophy.baseTotal} Unique</span>
                  <span>${getPercent(trophy.baseOwned, trophy.baseTotal)}%</span>
                </div>
                <span class="mini-track"><span class="mini-fill" style="width: ${getPercent(trophy.baseOwned, trophy.baseTotal)}%"></span></span>
              </div>
            </div>
          </button>
        `;
      }

      function renderCardTile(card, set) {
        const collection = getCollection(card.key);
        const totalQty = getTotalQuantity(card.key);
        const ownedClass = totalQty > 0 ? "owned" : "missing";
        const dupeClass = totalQty > 1 ? "duplicate" : "";
        const cardImage = renderCardImage(card, "low", "lazy");
        const variants = getVariantKeys(card);
        const variantButtons = variants.map((variant) => {
          const qty = collection[`${variant}Qty`] || 0;
          return `
            <button class="variant-badge ${variant} ${qty === 0 ? "zero" : ""}" type="button"
              data-card-key="${escapeAttr(card.key)}"
              data-variant="${escapeAttr(variant)}"
              title="${escapeAttr(VARIANT_LABELS[variant])}">
              ${VARIANT_SHORT[variant]} ${qty}
            </button>
          `;
        }).join("");
        const cartButtons = renderVariantCartButtons(card, "cart-icon");
        return `
          <article class="card-tile ${ownedClass} ${dupeClass}" data-card-key="${escapeAttr(card.key)}">
            <div class="card-image-shell ${cardImage ? "" : "image-missing"}">
              ${cardImage}
              <div class="image-placeholder">No image</div>
              <div class="variant-stack">${variantButtons}</div>
            </div>
            <div class="card-body">
              <div class="card-meta">
                <div class="card-meta-top">
                  <div class="card-name" title="${escapeAttr(card.name)}">${escapeHtml(card.name)}</div>
                </div>
                <div class="card-meta-bottom">
                  <div class="card-number">${escapeHtml(card.localId || "?")}</div>
                  <div class="card-meta-actions">
                    ${renderRaritySymbol(card.rarity)}
                    ${cartButtons}
                  </div>
                </div>
              </div>
            </div>
          </article>
        `;
      }

      function renderCardRow(card, set) {
        const collection = getCollection(card.key);
        const totalQty = getTotalQuantity(card.key);
        const cardImage = renderCardImage(card, "low", "lazy");
        const variants = getVariantKeys(card).map((variant) => {
          const qty = collection[`${variant}Qty`] || 0;
          return `
            <button class="variant-badge ${variant} ${qty === 0 ? "zero" : ""}" type="button"
              data-card-key="${escapeAttr(card.key)}"
              data-variant="${escapeAttr(variant)}"
              title="${escapeAttr(VARIANT_LABELS[variant])}">
              ${VARIANT_SHORT[variant]} ${qty}
            </button>
          `;
        }).join("");
        const cartButtons = renderVariantCartButtons(card, "cart-icon");
        return `
          <article class="card-row ${totalQty > 0 ? "owned" : "missing"}" data-card-key="${escapeAttr(card.key)}">
            <div class="card-row-thumb">
              ${cardImage || `<span class="card-row-sub">No image</span>`}
            </div>
            <div class="card-row-main">
              <div class="card-row-name">${escapeHtml(card.name)}</div>
              <div class="card-row-sub">#${escapeHtml(card.localId || "?")} - ${escapeHtml(card.rarity || "Rarity unknown")}</div>
            </div>
            <div class="card-row-price">Qty ${totalQty}</div>
            <div class="card-row-variants">${variants}</div>
            <div class="card-row-variants">${cartButtons}</div>
          </article>
        `;
      }

      function renderVariantCartButtons(card, className) {
        return getVariantKeys(card).map((variant) => `
          <button class="${className} ${variant}" type="button"
            data-cart-add="${escapeAttr(card.key)}"
            data-cart-variant="${escapeAttr(variant)}"
            title="Add ${escapeAttr(VARIANT_LABELS[variant])} to cart"
            aria-label="Add ${escapeAttr(VARIANT_LABELS[variant])} to cart">
            ${cartIconSvg()}
          </button>
        `).join("");
      }

      function renderRaritySymbol(rarity) {
        const label = rarity || "Rarity unknown";
        const normalized = normalizeSearch(label);
        let symbol = "•";
        let rarityClass = "common";
        if (normalized.includes("uncommon") || normalized.includes("incomum")) {
          symbol = "◆";
          rarityClass = "uncommon";
        } else if (/(ultra|secret|hyper|rainbow|gold|illustration|ilustracao|secreta|hiper)/.test(normalized)) {
          symbol = "★";
          rarityClass = "ultra";
        } else if (/(rare|rara|raro|holo|double)/.test(normalized)) {
          symbol = "★";
          rarityClass = "rare";
        }
        return `<span class="rarity-symbol ${rarityClass}" title="${escapeAttr(label)}" aria-label="${escapeAttr(label)}">${symbol}</span>`;
      }

      function cartIconSvg() {
        return `
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="20" r="1.6"></circle>
            <circle cx="18" cy="20" r="1.6"></circle>
            <path d="M3 4h2l2.2 11.2a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 1.9-1.4L22 8H7"></path>
            <path d="M15 7v6"></path>
            <path d="M12 10h6"></path>
          </svg>
        `;
      }

      function renderBinderPages(cards, set) {
        const pages = [];
        for (let index = 0; index < cards.length; index += 9) {
          const pageCards = cards.slice(index, index + 9);
          pages.push(`
            <section class="binder-page" aria-label="Binder page ${Math.floor(index / 9) + 1}">
              <div class="binder-page-title">
                <span>Page ${Math.floor(index / 9) + 1}</span>
                <span>${pageCards.length}/9</span>
              </div>
              <div class="binder-grid">
                ${pageCards.map((card) => renderCardTile(card, state.sets.get(card.setKey) || set)).join("")}
              </div>
            </section>
          `);
        }
        return pages.join("");
      }

      function getVisibleCards(cards) {
        const query = normalizeSearch(state.query);
        return cards
          .filter((card) => {
            if (!matchesCardFilters(card)) return false;
            const relevantQty = getRelevantQuantity(card);
            if (state.filter === "have" && relevantQty === 0) return false;
            if (state.filter === "need" && relevantQty !== 0) return false;
            if (state.filter === "dupes" && relevantQty <= 1) return false;
            if (!query) return true;
            const haystack = normalizeSearch([
              card.name,
              card.localId,
              card.rarity
            ].filter(Boolean).join(" "));
            return haystack.includes(query);
          })
          .sort(sortCards);
      }

      function getVisibleHomeCards(cards) {
        const query = normalizeSearch(state.query);
        return cards
          .filter((card) => {
            if (!matchesCardFilters(card)) return false;
            const relevantQty = getRelevantQuantity(card);
            if (state.filter === "have" && relevantQty === 0) return false;
            if (state.filter === "need" && relevantQty !== 0) return false;
            if (state.filter === "dupes" && relevantQty <= 1) return false;
            if (!query) return true;
            const set = state.sets.get(card.setKey);
            const haystack = normalizeSearch([
              card.name,
              card.localId,
              card.rarity,
              set?.name,
              set?.series
            ].filter(Boolean).join(" "));
            return haystack.includes(query);
          })
          .sort(sortHomeCards);
      }

      function sortCards(a, b) {
        const direction = state.sortDir === "desc" ? -1 : 1;
        let result = 0;
        if (state.sort === "name") {
          result = naturalCompare(a.name, b.name);
        } else if (state.sort === "rarity") {
          result = naturalCompare(a.rarity || "zz", b.rarity || "zz") || naturalCompare(a.localId, b.localId);
        } else {
          result = naturalCompare(a.localId, b.localId);
        }
        return result * direction;
      }

      function sortHomeCards(a, b) {
        const setA = state.sets.get(a.setKey);
        const setB = state.sets.get(b.setKey);
        const dateDiff = dateValue(setB?.releaseDate) - dateValue(setA?.releaseDate);
        if (dateDiff) return dateDiff;
        const orderDiff = Number(setB?.tcgdexOrder || 0) - Number(setA?.tcgdexOrder || 0);
        if (orderDiff) return orderDiff;
        const setDiff = naturalCompare(setB?.id || "", setA?.id || "");
        if (setDiff) return setDiff;
        return naturalCompare(a.localId, b.localId);
      }

      function getGroupedSets(lang) {
        const sets = Array.from(state.sets.values()).filter((set) => set.lang === lang && isSetVisibleInLibrary(set));
        const bySeries = new Map();
        sets.forEach((set) => {
          const series = set.series || "Other";
          const seriesId = set.seriesId || slugify(series);
          const key = `${seriesId}:${series}`;
          if (!bySeries.has(key)) {
            bySeries.set(key, {
              series,
              seriesId,
              rank: getSeriesRank(seriesId, series),
              newest: 0,
              sets: []
            });
          }
          const group = bySeries.get(key);
          group.sets.push(set);
          group.rank = Math.max(group.rank || 0, getSeriesRank(seriesId, series));
          group.newest = Math.max(group.newest, dateValue(set.releaseDate), Number(set.tcgdexOrder || 0));
        });

        return Array.from(bySeries.values())
          .map((group) => {
            group.sets.sort((a, b) => {
              const dateDiff = dateValue(b.releaseDate) - dateValue(a.releaseDate);
              if (dateDiff) return dateDiff;
              const orderDiff = Number(b.tcgdexOrder || 0) - Number(a.tcgdexOrder || 0);
              if (orderDiff) return orderDiff;
              return naturalCompare(b.id, a.id);
            });
            return group;
          })
          .sort((a, b) => {
            const rankDiff = (b.rank || 0) - (a.rank || 0);
            if (rankDiff) return rankDiff;
            const dateDiff = b.newest - a.newest;
            if (dateDiff) return dateDiff;
            if (a.series === "Other") return 1;
            if (b.series === "Other") return -1;
            return naturalCompare(a.series, b.series);
          });
      }

      function getSelectedSeriesContext() {
        const parsed = parseSeriesPageKey(state.selectedSetKey);
        if (!parsed) return null;
        const groups = getGroupedSets(parsed.lang);
        const group = groups.find((item) => String(item.seriesId || slugify(item.series)) === String(parsed.seriesId));
        if (!group) return null;
        const cards = group.sets.flatMap((set) => getCardsForSet(set.key));
        return {
          lang: parsed.lang,
          series: group.series,
          seriesId: group.seriesId,
          sets: group.sets,
          cards
        };
      }

      function getSeriesRank(seriesId, seriesName) {
        const id = slugify(seriesId || "");
        if (SERIES_RANK[id] !== undefined) return SERIES_RANK[id];
        const name = normalizeSearch(seriesName || "");
        if (name.includes("mega")) return SERIES_RANK.me;
        if (name.includes("scarlet") || name.includes("escarlate")) return SERIES_RANK.sv;
        if (name.includes("sword") || name.includes("espada")) return SERIES_RANK.swsh;
        if (name.includes("sun") || name.includes("sol")) return SERIES_RANK.sm;
        if (name.includes("pocket")) return SERIES_RANK.tcgp;
        if (name.includes("other") || name.includes("outro")) return SERIES_RANK.other;
        return 10;
      }

      function getSetCounts(cards, options = {}) {
        const eligibleCards = options.respectVariantFilters ? cards.filter(matchesCardFilters) : cards;
        const totalCards = eligibleCards.length;
        let have = 0;
        let dupes = 0;
        eligibleCards.forEach((card) => {
          const totalQty = getRelevantQuantity(card, options.respectVariantFilters);
          if (totalQty > 0) have += 1;
          if (totalQty > 1) dupes += 1;
        });
        const need = Math.max(0, totalCards - have);
        const percent = totalCards ? Math.round((have / totalCards) * 100) : 0;
        return { totalCards, have, need, dupes, percent };
      }

      function getVariantSupportCounts(cards) {
        return cards.filter(matchesSecretFilter).reduce((counts, card) => {
          getVariantKeys(card).forEach((variant) => {
            counts[variant] += 1;
          });
          return counts;
        }, { normal: 0, holo: 0, reverse: 0 });
      }

      function getSecretSupportCount(cards) {
        return cards.filter((card) => matchesVariantFilters(card) && isSecretCard(card)).length;
      }

      function getHomeStats(lang) {
        return getHomeCards(lang)
          .reduce((stats, card) => {
            const totalQty = getTotalQuantity(card.key);
            stats.totalCards += totalQty;
            if (totalQty > 0) {
              stats.uniqueCards += 1;
              getCardTypes(card).forEach((type) => {
                stats.typeCounts[type] = (stats.typeCounts[type] || 0) + 1;
              });
            }
            return stats;
          }, {
            totalCards: 0,
            uniqueCards: 0,
            typeCounts: Object.fromEntries(TYPE_ORDER.map((type) => [type, 0]))
          });
      }

      function getCardTypes(card) {
        return normalizeTypes(card.types || card.raw?.types || card.raw?.type || card.raw?.energyType || []);
      }

      function getSetTrophy(set, cards) {
        const official = getPrintedBaseTotal(set);
        const baseCards = cards.filter((card) => isBaseCard(card, official));
        const secretCards = cards.filter((card) => !isBaseCard(card, official));
        const baseOwned = baseCards.filter((card) => getTotalQuantity(card.key) > 0).length;
        const baseTotal = Math.max(official || 0, baseCards.length);
        const baseExtraSlots = [];
        baseCards.forEach((card) => {
          getVariantKeys(card).forEach((variant) => baseExtraSlots.push({ card, variant }));
        });
        const baseExtraOwned = baseExtraSlots.filter(({ card, variant }) => Number(getCollection(card.key)[`${variant}Qty`] || 0) > 0).length;
        const secretOwned = secretCards.filter((card) => getTotalQuantity(card.key) > 0).length;

        const basePercent = getPercent(baseOwned, baseTotal);
        const baseExtraPercent = getPercent(baseExtraOwned, baseExtraSlots.length);
        const secretPercent = getPercent(secretOwned, secretCards.length);
        const trophyEligible = isTrophyEligibleSet(set);
        const copper = trophyEligible && basePercent >= 50;
        const silver = trophyEligible && baseTotal > 0 && baseOwned >= baseTotal;
        const gold = trophyEligible && silver && baseExtraSlots.length > 0 && baseExtraOwned >= baseExtraSlots.length;
        const platinum = trophyEligible && gold && secretCards.length > 0 && secretOwned >= secretCards.length;
        const percent = basePercent + baseExtraPercent + secretPercent;
        const rank = platinum ? 4 : gold ? 3 : silver ? 2 : copper ? 1 : 0;
        const label = getTrophyName(rank);
        return {
          rank,
          label,
          percent: Math.min(300, percent),
          copper,
          silver,
          gold,
          platinum,
          baseOwned,
          baseTotal,
          baseExtraOwned,
          baseExtraTotal: baseExtraSlots.length,
          secretOwned,
          secretTotal: secretCards.length
        };
      }

      function isBaseCard(card, officialCount) {
        const local = Number(String(card.localId || "").replace(/\D/g, "")) || 0;
        return !officialCount || !local || local <= officialCount;
      }

      function renderTrophyBand(trophy) {
        return `
          <div class="tracker-panel">
            ${renderTrophyIcon(trophy)}
            <div class="tracker-bars">
              <div class="tracker-row">
                <span>Unique</span>
                <span class="mini-track"><span class="mini-fill" style="width: ${getPercent(trophy.baseOwned, trophy.baseTotal)}%"></span></span>
                <span class="tracker-row-count">${formatTrackerCount(trophy.baseOwned, trophy.baseTotal)}</span>
              </div>
              <div class="tracker-row">
                <span>Variants</span>
                <span class="mini-track"><span class="mini-fill" style="width: ${getPercent(trophy.baseExtraOwned, trophy.baseExtraTotal)}%"></span></span>
                <span class="tracker-row-count">${formatTrackerCount(trophy.baseExtraOwned, trophy.baseExtraTotal)}</span>
              </div>
              <div class="tracker-row">
                <span>Secrets</span>
                <span class="mini-track"><span class="mini-fill" style="width: ${getPercent(trophy.secretOwned, trophy.secretTotal)}%"></span></span>
                <span class="tracker-row-count">${formatTrackerCount(trophy.secretOwned, trophy.secretTotal)}</span>
              </div>
            </div>
            <div class="tracker-total">${trophy.percent}%</div>
          </div>
        `;
      }

      function renderShelfItem(set, trophy) {
        return `
          <div class="shelf-item" title="${escapeAttr(set.name)}">
            ${renderTrophyIcon(trophy)}
            <div class="shelf-logo">${renderSetLogoImage(set, "")}</div>
            <div class="shelf-name">${escapeHtml(set.name)}</div>
          </div>
        `;
      }

      function getPercent(done, total) {
        if (!total) return 0;
        return Math.max(0, Math.min(100, Math.round((done / total) * 100)));
      }

      function formatTrackerCount(done, total) {
        const safeDone = Math.max(0, Number(done || 0));
        const safeTotal = Math.max(0, Number(total || 0));
        return `${safeDone}/${safeTotal} - ${getPercent(safeDone, safeTotal)}%`;
      }

      function formatNumber(value) {
        return Number(value || 0).toLocaleString("en-US");
      }

      function formatLanguageLabel(lang) {
        const info = LANGUAGES[lang];
        if (!info) return String(lang || "").toUpperCase();
        return [info.flag, info.short].filter(Boolean).join(" ");
      }

      function renderTrophyIcon(trophy) {
        const title = getTrophyName(trophy.rank || 0);
        return `
          <div class="trophy-icon ${getTrophyClass(trophy)}" role="img" aria-label="${escapeAttr(title)}" title="${escapeAttr(title)}">
            <svg class="trophy-svg" viewBox="0 0 64 64" aria-hidden="true" focusable="false">
              <ellipse cx="32" cy="56" rx="17" ry="4" fill="rgba(148, 163, 184, 0.22)"></ellipse>
              <path d="M25 42h14v9H25z" fill="var(--trophy-dark)"></path>
              <path d="M20 51h24c2.2 0 4 1.8 4 4v1H16v-1c0-2.2 1.8-4 4-4z" fill="var(--trophy-main)"></path>
              <path d="M18 10h28v13c0 13-7.2 22-14 22s-14-9-14-22V10z" fill="var(--trophy-main)" stroke="var(--trophy-light)" stroke-width="2"></path>
              <path d="M18 17H9v5c0 8 5.8 14 13 14" fill="none" stroke="var(--trophy-dark)" stroke-width="5" stroke-linecap="round"></path>
              <path d="M46 17h9v5c0 8-5.8 14-13 14" fill="none" stroke="var(--trophy-dark)" stroke-width="5" stroke-linecap="round"></path>
              <path d="M25 15h14v4H25z" fill="var(--trophy-light)" opacity="0.75"></path>
              <path d="M29 26l3-6 3 6 6 .8-4.4 4.2 1.1 6-5.7-2.9-5.7 2.9 1.1-6-4.4-4.2z" fill="var(--trophy-light)" opacity="0.9"></path>
            </svg>
          </div>
        `;
      }

      function getTrophyClass(trophy) {
        if (trophy.rank === 4) return "platinum";
        if (trophy.rank === 3) return "gold";
        if (trophy.rank === 2) return "silver";
        if (trophy.rank === 1) return "copper";
        return "none";
      }

      function getTrophyName(rank) {
        if (rank === 4) return "Platinum";
        if (rank === 3) return "Gold";
        if (rank === 2) return "Silver";
        if (rank === 1) return "Copper";
        return "No trophy";
      }

      function getTrophyCounts() {
        return getTrophyItems().reduce((counts, item) => {
          if (item.trophy.rank === 4) counts.platinum += 1;
          else if (item.trophy.rank === 3) counts.gold += 1;
          else if (item.trophy.rank === 2) counts.silver += 1;
          else if (item.trophy.rank === 1) counts.copper += 1;
          return counts;
        }, { copper: 0, silver: 0, gold: 0, platinum: 0 });
      }

      function getTrophyItems() {
        return Array.from(state.sets.values())
          .filter((set) => set.lang === state.activeLang)
          .filter(isTrophyEligibleSet)
          .filter((set) => getCardsForSet(set.key).length > 0)
          .map((set) => ({ set, trophy: getSetTrophy(set, getCardsForSet(set.key)) }))
          .filter((item) => item.trophy.rank > 0);
      }

      function getTrophyRoomGroups() {
        const bySeries = new Map();
        Array.from(state.sets.values())
          .filter((set) => set.lang === state.activeLang)
          .filter(isTrophyEligibleSet)
          .filter((set) => getCardsForSet(set.key).length > 0)
          .forEach((set) => {
          const series = set.series || "Other";
          const seriesId = set.seriesId || slugify(series);
          const key = `${seriesId}:${series}`;
          if (!bySeries.has(key)) {
            bySeries.set(key, {
              series,
              seriesId,
              rank: getSeriesRank(seriesId, series),
              newest: 0,
              sets: []
            });
          }
          const group = bySeries.get(key);
          group.newest = Math.max(group.newest, dateValue(set.releaseDate), Number(set.tcgdexOrder || 0));
          group.sets.push({ set, trophy: getSetTrophy(set, getCardsForSet(set.key)) });
        });
        return Array.from(bySeries.values())
          .map((group) => {
            group.sets.sort((a, b) => {
              const dateDiff = dateValue(a.set.releaseDate) - dateValue(b.set.releaseDate);
              if (dateDiff) return dateDiff;
              const orderDiff = Number(a.set.tcgdexOrder || 0) - Number(b.set.tcgdexOrder || 0);
              if (orderDiff) return orderDiff;
              return naturalCompare(a.set.id, b.set.id);
            });
            return group;
          })
          .sort((a, b) => {
            const rankDiff = (b.rank || 0) - (a.rank || 0);
            if (rankDiff) return rankDiff;
            const dateDiff = b.newest - a.newest;
            if (dateDiff) return dateDiff;
            return naturalCompare(a.series, b.series);
          });
      }

      function isTrophyEligibleSet(set) {
        if (!set) return false;
        const haystack = normalizeSearch([set.id, set.name, set.series, set.seriesId].filter(Boolean).join(" "));
        return !/(promo|promos|black star|energia|energy|deck|decks|theme deck|battle deck|trainer kit|world championship|jumbo)/.test(haystack);
      }

      function matchesVariantFilters(card) {
        const supported = new Set(getVariantKeys(card));
        return Array.from(state.variantFilters).some((variant) => supported.has(variant));
      }

      function matchesSecretFilter(card) {
        return state.includeSecretCards || !isSecretCard(card);
      }

      function matchesCardFilters(card) {
        return matchesVariantFilters(card) && matchesSecretFilter(card);
      }

      function isSecretCard(card) {
        const set = state.sets.get(card.setKey);
        return !isBaseCard(card, getPrintedBaseTotal(set));
      }

      function getRelevantQuantity(card, respectVariantFilters = true) {
        const entry = getCollection(card.key);
        if (!respectVariantFilters) {
          return entry.normalQty + entry.holoQty + entry.reverseQty;
        }
        return Array.from(state.variantFilters).reduce((sum, variant) => {
          if (!getVariantKeys(card).includes(variant)) return sum;
          return sum + Number(entry[`${variant}Qty`] || 0);
        }, 0);
      }

      function getCardPrice(card) {
        return getCardMinPrice(card);
      }

      function getCardMinPrice(card) {
        const prices = getVariantKeys(card)
          .map((variant) => getVariantPrice(card.key, variant))
          .filter((price) => price > 0);
        return prices.length ? Math.min(...prices) : 0;
      }

      function getVariantPrice(cardKey, variant) {
        const collection = getCollection(cardKey);
        return Number(collection[`${variant}Price`] || 0) || 0;
      }

      function getCardOwnedValue(card) {
        const collection = getCollection(card.key);
        return (
          Number(collection.normalQty || 0) * getVariantPrice(card.key, "normal") +
          Number(collection.holoQty || 0) * getVariantPrice(card.key, "holo") +
          Number(collection.reverseQty || 0) * getVariantPrice(card.key, "reverse")
        );
      }

      function getSetEstimate(cards) {
        return cards.reduce((sum, card) => sum + getCardMinPrice(card), 0);
      }

      function getUserValue(cards) {
        return cards.reduce((sum, card) => sum + getCardOwnedValue(card), 0);
      }

      function getMostExpensiveCard(cards) {
        return cards.reduce((best, card) => {
          const price = getCardPrice(card);
          if (!price) return best;
          if (!best || price > best.price) return { name: card.name, price };
          return best;
        }, null);
      }

      function handleTreeClick(event) {
        const langButton = event.target.closest("[data-lang-toggle]");
        if (langButton) {
          const lang = langButton.dataset.langToggle;
          if (state.expandedLangs.has(lang)) {
            state.expandedLangs.delete(lang);
          } else {
            state.expandedLangs.add(lang);
          }
          renderSidebar();
          return;
        }

        const seriesButton = event.target.closest("[data-series-toggle]");
        if (seriesButton) {
          const key = seriesButton.dataset.seriesToggle;
          if (state.expandedSeries.has(key)) {
            state.expandedSeries.delete(key);
          } else {
            state.expandedSeries.add(key);
          }
          renderSidebar();
          return;
        }

        const seriesOpenButton = event.target.closest("[data-series-open]");
        if (seriesOpenButton) {
          selectSeriesPage(seriesOpenButton.dataset.seriesOpen);
          return;
        }

        const setButton = event.target.closest("[data-set-key]");
        if (setButton) {
          selectSet(setButton.dataset.setKey);
        }
      }

      function setSyncStatus(lang, status, label) {
        state.syncState[lang] = { status, label };
        renderSyncPill();
      }

      function addNotice(message, type = "warn", autoDismiss = 0) {
        const id = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        state.notices = state.notices.filter((notice) => notice.message !== message);
        state.notices.push({ id, message, type });
        if (state.notices.length > 4) {
          state.notices = state.notices.slice(state.notices.length - 4);
        }
        renderNotices();
        if (autoDismiss) {
          window.setTimeout(() => {
            state.notices = state.notices.filter((notice) => notice.id !== id);
            renderNotices();
          }, autoDismiss);
        }
      }

      function ensureExpandedForSelectedSet() {
        const set = state.sets.get(state.selectedSetKey);
        if (!set) return;
        state.expandedLangs.add(set.lang);
        state.expandedSeries.add(`${set.lang}:${set.seriesId || slugify(set.series || "Other")}`);
      }

      function setSidebarOpen(isOpen) {
        state.sidebarOpen = isOpen;

      function openCardPreview(cardKey) {

      function renderCardPreview() {

          els.cardPreview.innerHTML = "";
          return;
        }

              <div class="preview-meta">

              </div>
              <div class="preview-variants">${variantButtons}</div>
              <div class="preview-actions">
