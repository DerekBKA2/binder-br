      // Google Drive sync stores only user-owned collection and cart data in appDataFolder.
      // TCGdex catalog data remains local/cacheable and is rebuilt independently on each device.
      function loadCloudConfig() {
        try {
          const saved = JSON.parse(localStorage.getItem(CLOUD_CONFIG_STORAGE_KEY) || "{}");
          state.cloud.clientId = String(saved.clientId || DEFAULT_GOOGLE_CLIENT_ID);
          state.cloud.deviceId = String(saved.deviceId || "") || makeDeviceId();
          state.cloud.fileId = String(saved.fileId || "");
          state.cloud.lastSyncAt = String(saved.lastSyncAt || "");
          state.cloud.collectionResetAt = String(saved.collectionResetAt || "");
          state.cloud.cartUpdatedAt = String(saved.cartUpdatedAt || "");
          state.cloud.authorizedBefore = Boolean(saved.authorizedBefore);
          state.cloud.firstSyncComplete = Boolean(saved.firstSyncComplete);
          const session = JSON.parse(sessionStorage.getItem(CLOUD_TOKEN_SESSION_KEY) || "{}");
          state.cloud.accessToken = String(session.accessToken || "");
          state.cloud.tokenExpiresAt = Number(session.tokenExpiresAt || 0);
        } catch (error) {
          state.cloud.clientId = DEFAULT_GOOGLE_CLIENT_ID;
          state.cloud.deviceId = makeDeviceId();
          console.warn("Cloud settings load failed:", error);
        }
        persistCloudConfig();
      }

      function persistCloudToken() {
        try {
          if (hasCloudToken()) {
            sessionStorage.setItem(CLOUD_TOKEN_SESSION_KEY, JSON.stringify({
              accessToken: state.cloud.accessToken,
              tokenExpiresAt: state.cloud.tokenExpiresAt
            }));
          } else {
            sessionStorage.removeItem(CLOUD_TOKEN_SESSION_KEY);
          }
        } catch (error) {
          console.warn("Cloud session save failed:", error);
        }
      }

      function makeDeviceId() {
        if (window.crypto?.randomUUID) return window.crypto.randomUUID();
        return `device-${Date.now()}-${Math.random().toString(36).slice(2)}`;
      }

      function persistCloudConfig() {
        try {
          localStorage.setItem(CLOUD_CONFIG_STORAGE_KEY, JSON.stringify({
            clientId: state.cloud.clientId,
            deviceId: state.cloud.deviceId,
            fileId: state.cloud.fileId,
            lastSyncAt: state.cloud.lastSyncAt,
            collectionResetAt: state.cloud.collectionResetAt,
            cartUpdatedAt: state.cloud.cartUpdatedAt,
            authorizedBefore: state.cloud.authorizedBefore,
            firstSyncComplete: state.cloud.firstSyncComplete
          }));
        } catch (error) {
          console.warn("Cloud settings save failed:", error);
        }
      }

      function isCloudHostSupported() {
        return location.protocol === "https:" || (location.protocol === "http:" && ["localhost", "127.0.0.1", "::1"].includes(location.hostname));
      }

      function hasCloudToken() {
        return Boolean(state.cloud.accessToken && state.cloud.tokenExpiresAt > Date.now() + 30000);
      }

      function formatCloudTime(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? "never" : date.toLocaleString();
      }

      function refreshCloudUi() {
        renderCloudButton();
        if (!els.cloudOverlay.hidden) renderCloudPanel();
      }

      function openCloud() {
        renderCloudPanel();
        els.cloudOverlay.hidden = false;
      }

      function closeCloud() {
        els.cloudOverlay.hidden = true;
      }

      function renderCloudPanel() {
        const supported = isCloudHostSupported();
        const connected = hasCloudToken();
        const localHasData = hasCloudUserData(buildCloudPayload());
        const statusClass = state.cloud.error ? "error" : connected ? "connected" : "";
        const statusText = state.cloud.status === "syncing"
          ? "Syncing collection and cart..."
          : state.cloud.error
            ? state.cloud.error
            : connected
              ? `Connected${state.cloud.lastSyncAt ? ` - last sync ${formatCloudTime(state.cloud.lastSyncAt)}` : ""}`
              : supported
                ? "Not connected"
                : "Google authorization requires HTTPS or localhost. The current file:// page keeps working locally.";
        els.cloudOverlay.innerHTML = `
          <section class="cloud-dialog" role="dialog" aria-modal="true" aria-label="Google Drive sync">
            <div class="cloud-head">
              <h2>Google Drive Sync</h2>
              <button type="button" data-close-cloud>Close</button>
            </div>
            <label class="cloud-field">
              Google OAuth Client ID
              <input id="cloudClientIdInput" type="text" value="${escapeAttr(state.cloud.clientId)}" placeholder="000000000000-xxxxxxxx.apps.googleusercontent.com" autocomplete="off">
            </label>
            <div class="cloud-status-row">
              <span class="cloud-status ${statusClass}">${escapeHtml(statusText)}</span>
              <span class="cloud-status">Private app data only</span>
            </div>
            ${!localHasData && !state.cloud.firstSyncComplete ? `
              <div class="notice error">
                <span>No collection data exists at this browser address. If you previously used the file:// version, export its backup and import it here before syncing.</span>
              </div>
            ` : ""}
            ${!supported ? `
              <div class="notice error">
                <span>Google Drive cannot connect from a file:// page. Keep this page for local recovery, then open the HTTPS app to restore from Drive.</span>
                <a href="${ONLINE_APP_URL}" target="_blank" rel="noopener noreferrer">Open online Binder BR</a>
              </div>
            ` : ""}
            <div class="cloud-actions">
              <button type="button" data-cloud-action="save">Save Client ID</button>
              <button type="button" data-cloud-action="connect" ${!supported || state.cloud.status === "syncing" ? "disabled" : ""}>${connected ? "Reconnect" : "Connect Google Drive"}</button>
              <button type="button" data-cloud-action="sync" ${!connected || state.cloud.status === "syncing" ? "disabled" : ""}>Sync now</button>
              <button type="button" data-cloud-action="restore-drive" ${!connected || state.cloud.status === "syncing" ? "disabled" : ""}>Restore from Drive</button>
              <button type="button" data-cloud-action="restore" ${!state.cloud.recoverySnapshot ? "disabled" : ""}>Restore local checkpoint</button>
              <button type="button" data-cloud-action="disconnect" ${!state.cloud.accessToken ? "disabled" : ""}>Disconnect</button>
            </div>
          </section>
        `;
      }

      function saveCloudClientIdFromForm() {
        const input = els.cloudOverlay.querySelector("#cloudClientIdInput");
        state.cloud.clientId = String(input?.value || "").trim();
        state.cloud.error = "";
        persistCloudConfig();
        refreshCloudUi();
        return state.cloud.clientId;
      }

      async function handleCloudAction(action) {
        if (action === "save") {
          saveCloudClientIdFromForm();
          addNotice("Google Client ID saved on this device.", "warn", 2500);
          return;
        }
        if (action === "connect") {
          saveCloudClientIdFromForm();
          await connectGoogleDrive();
          return;
        }
        if (action === "sync") {
          await syncGoogleDrive();
          return;
        }
        if (action === "restore-drive") {
          await restoreFromGoogleDrive();
          return;
        }
        if (action === "restore") {
          await restoreCloudRecoverySnapshot();
          return;
        }
        if (action === "disconnect") {
          const token = state.cloud.accessToken;
          if (token && window.google?.accounts?.oauth2?.revoke) {
            window.google.accounts.oauth2.revoke(token, () => {});
          }
          state.cloud.accessToken = "";
          state.cloud.tokenExpiresAt = 0;
          persistCloudToken();
          state.cloud.status = "idle";
          state.cloud.error = "";
          refreshCloudUi();
        }
      }

      function waitForGoogleIdentity(timeoutMs = 10000) {
        return new Promise((resolve, reject) => {
          const startedAt = Date.now();
          const check = () => {
            if (window.google?.accounts?.oauth2) {
              resolve(window.google.accounts.oauth2);
              return;
            }
            if (Date.now() - startedAt >= timeoutMs) {
              reject(new Error("Google sign-in library did not load"));
              return;
            }
            window.setTimeout(check, 100);
          };
          check();
        });
      }

      async function connectGoogleDrive() {
        if (!isCloudHostSupported()) {
          state.cloud.error = "Open Binder BR from an HTTPS address before connecting Google Drive.";
          refreshCloudUi();
          return;
        }
        if (!state.cloud.clientId) {
          state.cloud.error = "Enter your Google OAuth Client ID first.";
          refreshCloudUi();
          return;
        }
        state.cloud.status = "connecting";
        state.cloud.error = "";
        refreshCloudUi();
        try {
          const oauth2 = await waitForGoogleIdentity();
          const tokenResponse = await new Promise((resolve, reject) => {
            const tokenClient = oauth2.initTokenClient({
              client_id: state.cloud.clientId,
              scope: GOOGLE_DRIVE_SCOPE,
              callback: (response) => {
                if (response?.error) {
                  reject(new Error(response.error_description || response.error));
                  return;
                }
                resolve(response);
              },
              error_callback: (error) => reject(new Error(error?.message || error?.type || "Google authorization failed"))
            });
            tokenClient.requestAccessToken({ prompt: state.cloud.authorizedBefore ? "" : "consent" });
          });
          state.cloud.accessToken = tokenResponse.access_token || "";
          state.cloud.tokenExpiresAt = Date.now() + Math.max(60, Number(tokenResponse.expires_in || 3600) - 60) * 1000;
          persistCloudToken();
          state.cloud.authorizedBefore = true;
          state.cloud.status = "connected";
          persistCloudConfig();
          refreshCloudUi();
          await syncGoogleDrive();
        } catch (error) {
          state.cloud.status = "error";
          state.cloud.error = error.message || "Google Drive connection failed.";
          refreshCloudUi();
          console.warn("Google Drive connection failed:", error);
        }
      }

      async function driveFetch(url, options = {}) {
        if (!hasCloudToken()) throw new Error("Google Drive session expired. Connect again.");
        const headers = new Headers(options.headers || {});
        headers.set("Authorization", `Bearer ${state.cloud.accessToken}`);
        const response = await fetch(url, { ...options, headers });
        if (response.status === 401) {
          state.cloud.accessToken = "";
          state.cloud.tokenExpiresAt = 0;
          persistCloudToken();
          throw new Error("Google Drive session expired. Connect again.");
        }
        if (!response.ok) {
          const detail = await response.text().catch(() => "");
          throw new Error(`Google Drive request failed (${response.status})${detail ? `: ${detail.slice(0, 180)}` : ""}`);
        }
        return response;
      }

      async function findCloudFile() {
        if (state.cloud.fileId) return state.cloud.fileId;
        const query = `name='${CLOUD_FILE_NAME.replace(/'/g, "\\'")}' and trashed=false`;
        const params = new URLSearchParams({
          spaces: "appDataFolder",
          q: query,
          fields: "files(id,name,modifiedTime)",
          orderBy: "modifiedTime desc",
          pageSize: "10"
        });
        const response = await driveFetch(`https://www.googleapis.com/drive/v3/files?${params}`);
        const data = await response.json();
        state.cloud.fileId = data.files?.[0]?.id || "";
        persistCloudConfig();
        return state.cloud.fileId;
      }

      async function downloadCloudPayload(fileId) {
        if (!fileId) return null;
        const response = await driveFetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(fileId)}?alt=media`);
        return response.json();
      }

      async function createCloudFile(payload) {
        const boundary = `binder_br_${Date.now()}`;
        const metadata = JSON.stringify({
          name: CLOUD_FILE_NAME,
          parents: ["appDataFolder"],
          mimeType: "application/json"
        });
        const body = [
          `--${boundary}`,
          "Content-Type: application/json; charset=UTF-8",
          "",
          metadata,
          `--${boundary}`,
          "Content-Type: application/json",
          "",
          JSON.stringify(payload),
          `--${boundary}--`
        ].join("\r\n");
        const response = await driveFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime", {
          method: "POST",
          headers: { "Content-Type": `multipart/related; boundary=${boundary}` },
          body
        });
        const data = await response.json();
        state.cloud.fileId = data.id || "";
        persistCloudConfig();
      }

      async function updateCloudFile(fileId, payload) {
        await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${encodeURIComponent(fileId)}?uploadType=media&fields=id,modifiedTime`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
      }

      function timestampValue(value) {
        const time = new Date(value || 0).getTime();
        return Number.isFinite(time) ? time : 0;
      }

      function newestTimestamp(...values) {
        const newest = values.reduce((best, value) => timestampValue(value) > timestampValue(best) ? value : best, "");
        return newest || "";
      }

      function isCollectionEntryMeaningful(entry) {
        return Boolean(
          entry.updatedAt || entry.normalQty || entry.holoQty || entry.reverseQty ||
          entry.paidPrice || entry.brPrice || entry.normalPrice || entry.holoPrice || entry.reversePrice ||
          entry.condition || entry.ligaUrl || entry.notes
        );
      }

      function normalizeCartItem(item) {
        if (!item?.cardKey) return null;
        const variant = ["normal", "holo", "reverse"].includes(item.variant) ? item.variant : "normal";
        return {
          cartKey: item.cartKey || makeCartKey(item.cardKey, variant),
          cardKey: item.cardKey,
          variant,
          qty: Math.max(1, Number(item.qty || 1)),
          condition: item.condition || "NM",
          snapshot: item.snapshot || null,
          updatedAt: item.updatedAt || ""
        };
      }

      function buildCloudPayload() {
        return {
          app: "Binder BR",
          version: 1,
          updatedAt: new Date().toISOString(),
          deviceId: state.cloud.deviceId,
          collectionResetAt: state.cloud.collectionResetAt,
          cartUpdatedAt: state.cloud.cartUpdatedAt,
          collection: Array.from(state.collection.values()).filter(isCollectionEntryMeaningful).map(normalizeCollection),
          cart: Array.from(state.cart.values()).map(normalizeCartItem).filter(Boolean)
        };
      }

      function hasCloudUserData(payload) {
        const normalized = normalizeCloudPayload(payload || {});
        const hasCollection = normalized.collection.some((entry) => Boolean(
          entry.normalQty || entry.holoQty || entry.reverseQty || entry.paidPrice || entry.brPrice ||
          entry.normalPrice || entry.holoPrice || entry.reversePrice || entry.condition || entry.ligaUrl || entry.notes
        ));
        return hasCollection || normalized.cart.length > 0;
      }

      function normalizeCloudPayload(payload) {
        const payloadUpdatedAt = String(payload?.updatedAt || "");
        return {
          app: "Binder BR",
          version: 1,
          updatedAt: payloadUpdatedAt,
          deviceId: String(payload?.deviceId || ""),
          collectionResetAt: String(payload?.collectionResetAt || ""),
          cartUpdatedAt: String(payload?.cartUpdatedAt || ""),
          collection: (Array.isArray(payload?.collection) ? payload.collection : [])
            .filter((entry) => entry?.cardKey)
            .map((entry) => normalizeCollection({ ...entry, updatedAt: entry.updatedAt || payloadUpdatedAt })),
          cart: (Array.isArray(payload?.cart) ? payload.cart : [])
            .map((item) => normalizeCartItem({ ...item, updatedAt: item?.updatedAt || payloadUpdatedAt }))
            .filter(Boolean)
        };
      }

      function mergeCloudPayload(remotePayload) {
        const local = normalizeCloudPayload(buildCloudPayload());
        const remote = normalizeCloudPayload(remotePayload || {});
        const resetAt = newestTimestamp(local.collectionResetAt, remote.collectionResetAt);
        const resetTime = timestampValue(resetAt);
        const mergedCollection = new Map();
        [...local.collection, ...remote.collection].forEach((entry) => {
          const entryTime = timestampValue(entry.updatedAt);
          if (resetTime && entryTime <= resetTime) return;
          const current = mergedCollection.get(entry.cardKey);
          if (!current || entryTime >= timestampValue(current.updatedAt)) {
            mergedCollection.set(entry.cardKey, entry);
          }
        });
        const remoteCartWins = timestampValue(remote.cartUpdatedAt) > timestampValue(local.cartUpdatedAt);
        return {
          app: "Binder BR",
          version: 1,
          updatedAt: new Date().toISOString(),
          deviceId: state.cloud.deviceId,
          collectionResetAt: resetAt,
          cartUpdatedAt: remoteCartWins ? remote.cartUpdatedAt : local.cartUpdatedAt,
          collection: Array.from(mergedCollection.values()),
          cart: remoteCartWins ? remote.cart : local.cart
        };
      }

      async function hydrateCloudRecoveryFromDb() {
        if (!state.db) return;
        const saved = await idbGet("meta", CLOUD_RECOVERY_META_KEY);
        state.cloud.recoverySnapshot = saved?.payload ? saved : null;
      }

      async function saveCloudRecoverySnapshot(payload, reason = "Before Google Drive sync") {
        const normalized = normalizeCloudPayload(payload);
        if (!hasCloudUserData(normalized)) return;
        const recovery = {
          key: CLOUD_RECOVERY_META_KEY,
          createdAt: new Date().toISOString(),
          reason,
          payload: normalized
        };
        state.cloud.recoverySnapshot = recovery;
        await idbPut("meta", recovery);
      }

      async function restoreCloudRecoverySnapshot() {
        const recovery = state.cloud.recoverySnapshot;
        if (!recovery?.payload) return;
        if (!window.confirm(`Restore the local collection checkpoint from ${formatCloudTime(recovery.createdAt)}?`)) return;
        const restoredAt = new Date().toISOString();
        const restored = normalizeCloudPayload(recovery.payload);
        restored.updatedAt = restoredAt;
        restored.collectionResetAt = "";
        restored.collection = restored.collection.map((entry) => ({ ...entry, updatedAt: restoredAt }));
        restored.cartUpdatedAt = restoredAt;
        restored.cart = restored.cart.map((item) => ({ ...item, updatedAt: restoredAt }));
        await applyCloudPayload(restored, { skipRecovery: true });
        state.cloud.firstSyncComplete = true;
        persistCloudConfig();
        scheduleCloudSync();
        addNotice("Local collection checkpoint restored.", "warn", 3500);
        refreshCloudUi();
      }

      async function restoreFromGoogleDrive() {
        if (!hasCloudToken()) {
          state.cloud.error = "Connect Google Drive before restoring.";
          refreshCloudUi();
          return;
        }
        if (hasCloudUserData(buildCloudPayload()) && !window.confirm("Replace this browser's collection with the saved Google Drive collection? A local checkpoint will be kept.")) {
          return;
        }
        state.cloud.syncInFlight = true;
        state.cloud.status = "syncing";
        state.cloud.error = "";
        refreshCloudUi();
        try {
          const fileId = await findCloudFile();
          const remote = fileId ? normalizeCloudPayload(await downloadCloudPayload(fileId)) : null;
          if (!remote || !hasCloudUserData(remote)) {
            throw new Error("No saved collection was found in Google Drive.");
          }
          await saveCloudRecoverySnapshot(buildCloudPayload(), "Before restoring from Google Drive");
          await applyCloudPayload(remote, { skipRecovery: true });
          state.cloud.lastSyncAt = new Date().toISOString();
          state.cloud.firstSyncComplete = true;
          state.cloud.status = "connected";
          persistCloudConfig();
          addNotice("Collection restored from Google Drive.", "warn", 3500);
        } catch (error) {
          state.cloud.status = "error";
          state.cloud.error = error.message || "Google Drive restore failed.";
          addNotice("Google Drive restore failed. Local data was kept.", "error", 4500);
          console.warn("Google Drive restore failed:", error);
        } finally {
          state.cloud.syncInFlight = false;
          refreshCloudUi();
        }
      }

      async function applyCloudPayload(payload, options = {}) {
        const normalized = normalizeCloudPayload(payload);
        state.cloud.suppressAutoSync = true;
        try {
          if (!options.skipRecovery) {
            await saveCloudRecoverySnapshot(buildCloudPayload());
          }
          state.collection = new Map(normalized.collection.map((entry) => [entry.cardKey, entry]));
          state.cart = new Map(normalized.cart.map((item) => [item.cartKey, item]));
          state.cloud.collectionResetAt = normalized.collectionResetAt;
          state.cloud.cartUpdatedAt = normalized.cartUpdatedAt;
          await idbClear("collection");
          await idbPutMany("collection", normalized.collection);
          saveCart(false);
          persistCloudConfig();
          renderAll();
        } finally {
          state.cloud.suppressAutoSync = false;
        }
      }

      async function syncGoogleDrive(options = {}) {
        if (state.cloud.syncInFlight) return;
        if (!hasCloudToken()) {
          state.cloud.error = "Connect Google Drive before syncing.";
          refreshCloudUi();
          return;
        }
        state.cloud.syncInFlight = true;
        state.cloud.status = "syncing";
        state.cloud.error = "";
        refreshCloudUi();
        try {
          const fileId = await findCloudFile();
          const remote = fileId ? await downloadCloudPayload(fileId) : null;
          const local = buildCloudPayload();
          if (!state.cloud.firstSyncComplete && !hasCloudUserData(local) && !hasCloudUserData(remote)) {
            throw new Error("No collection was found at this browser address or in Google Drive. Import the backup from your previous file:// version before syncing.");
          }
          const merged = mergeCloudPayload(remote);
          await applyCloudPayload(merged);
          if (fileId) {
            await updateCloudFile(fileId, merged);
          } else {
            await createCloudFile(merged);
          }
          state.cloud.lastSyncAt = new Date().toISOString();
          state.cloud.firstSyncComplete = true;
          state.cloud.status = "connected";
          persistCloudConfig();
          if (!options.silent) addNotice("Google Drive sync complete.", "warn", 2500);
        } catch (error) {
          state.cloud.status = "error";
          state.cloud.error = error.message || "Google Drive sync failed.";
          if (!options.silent) addNotice("Google Drive sync failed. Local data was kept.", "error", 4500);
          console.warn("Google Drive sync failed:", error);
        } finally {
          state.cloud.syncInFlight = false;
          refreshCloudUi();
        }
      }

      function scheduleCloudSync() {
        if (state.cloud.suppressAutoSync || !hasCloudToken()) return;
        window.clearTimeout(state.cloud.syncTimer);
        state.cloud.syncTimer = window.setTimeout(() => syncGoogleDrive({ silent: true }), CLOUD_SYNC_DELAY_MS);
      }

      function loadCart() {
        try {
          const items = JSON.parse(localStorage.getItem(CART_STORAGE_KEY) || "[]");
          if (!Array.isArray(items)) return;
          items.forEach((item) => {
            const normalized = normalizeCartItem(item);
            if (normalized) state.cart.set(normalized.cartKey, normalized);
          });
          if (state.cart.size && !state.cloud.cartUpdatedAt) {
            state.cloud.cartUpdatedAt = newestTimestamp(...Array.from(state.cart.values()).map((item) => item.updatedAt)) || new Date().toISOString();
            persistCloudConfig();
          }
        } catch (error) {
          console.warn("Cart load failed:", error);
        }
      }

      function saveCart(touchCloud = true) {
        try {
          localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(Array.from(state.cart.values())));
          if (touchCloud && !state.cloud.suppressAutoSync) {
            state.cloud.cartUpdatedAt = new Date().toISOString();
            persistCloudConfig();
            scheduleCloudSync();
          }
        } catch (error) {
          console.warn("Cart save failed:", error);
        }
      }

      function addToCart(cardKey, variant = "normal", options = {}) {
        const card = findCard(cardKey);
        if (!card) return;
        const cartKey = makeCartKey(cardKey, variant);
        const current = state.cart.get(cartKey);
        const set = state.sets.get(card.setKey);
        const updatedAt = new Date().toISOString();
        if (current) {
          current.qty += 1;
          current.snapshot = getCartSnapshot(card, set, variant);
          current.updatedAt = updatedAt;
        } else {
          state.cart.set(cartKey, {
            cartKey,
            cardKey,
            variant,
            qty: 1,
            condition: "NM",
            snapshot: getCartSnapshot(card, set, variant),
            updatedAt
          });
        }
        saveCart();
        if (!options.silent) {
          renderCart();
          addNotice(`${card.name} ${VARIANT_LABELS[variant]} added to cart.`, "warn", 2200);
        }
      }

      function openCart() {
        renderCart();
        els.cartOverlay.hidden = false;
      }

      function closeCart() {
        els.cartOverlay.hidden = true;
      }

      function renderCart() {
        const items = Array.from(state.cart.values());
        const total = items.reduce((sum, item) => sum + Number(item.qty || 0), 0);
        els.cartBtn.textContent = `Cart (${total})`;
        const pages = buildLigaListPages();
        state.cartListPage = clampCartListPage(state.cartListPage, pages.length);
        const page = pages[state.cartListPage] || { text: "", count: 0, lines: [] };
        const pageCount = Math.max(1, pages.length);
        const itemHtml = items.length ? items.map((item) => renderCartItem(item)).join("") : `<div class="empty-state">Cart is empty.</div>`;
        els.cartOverlay.innerHTML = `
          <section class="cart-dialog" role="dialog" aria-modal="true" aria-label="Cart">
            <div class="cart-head">
              <h2>Cart</h2>
              <button type="button" data-close-cart>Close</button>
            </div>
            <div class="cart-export-panel">
              <div class="cart-page-meta">
                <span>LigaPokemon list page ${state.cartListPage + 1}/${pageCount} · ${page.count}/${CART_LIST_PAGE_SIZE} cards</span>
                <span>${total} cards total</span>
              </div>
              <textarea id="cartListText" class="cart-list-text" readonly>${escapeHtml(page.text)}</textarea>
              <div class="cart-page-actions">
                <button type="button" data-cart-action="page-prev" ${state.cartListPage <= 0 ? "disabled" : ""}>Previous page</button>
                <button type="button" data-cart-action="page-next" ${state.cartListPage >= pageCount - 1 ? "disabled" : ""}>Next page</button>
                <button type="button" data-cart-action="copy">Copy page</button>
                <button type="button" data-cart-action="buy">Buy page</button>
                <button type="button" data-cart-action="clear" class="danger">Clear</button>
              </div>
            </div>
            <div class="cart-list">${itemHtml}</div>
          </section>
        `;
      }

      function renderCartItem(item) {
        const card = findCard(item.cardKey);
        const snapshot = card ? getCartSnapshot(card, state.sets.get(card.setKey), item.variant || "normal") : item.snapshot;
        const name = snapshot?.name || item.cardKey;
        const number = snapshot?.number || "";
        const extras = buildLigaVariantExtra(item.variant || "normal");
        const ligaUrl = card ? buildLigaPokemonUrl(card, state.sets.get(card.setKey)) : "https://www.ligapokemon.com.br/?view=cards/search";
        return `
          <article class="cart-item">
            <div class="cart-item-title">
              <div class="cart-item-name">${escapeHtml(name)}</div>
              <div class="cart-item-sub">${escapeHtml(number)} ${escapeHtml(VARIANT_LABELS[item.variant || "normal"] || "Normal")} · Condition ${escapeHtml(formatLigaCondition(item.condition)).toUpperCase()} ${escapeHtml(buildLigaVariantExtraLabel(item.variant || "normal"))}</div>
            </div>
            <div class="cart-qty">
              <button type="button" data-cart-action="dec" data-cart-key="${escapeAttr(item.cartKey)}">-</button>
              <span>${Number(item.qty || 1)}</span>
              <button type="button" data-cart-action="inc" data-cart-key="${escapeAttr(item.cartKey)}">+</button>
            </div>
            <a class="liga-link" href="${escapeAttr(ligaUrl)}" target="_blank" rel="noopener noreferrer">Liga</a>
          </article>
        `;
      }

      async function handleCartAction(action, cartKey) {
        if (action === "page-prev" || action === "page-next") {
          const pages = buildLigaListPages();
          state.cartListPage = clampCartListPage(state.cartListPage + (action === "page-next" ? 1 : -1), pages.length);
          renderCart();
          return;
        }
        if (action === "inc" || action === "dec") {
          const item = state.cart.get(cartKey);
          if (!item) return;
          item.qty = Math.max(0, Number(item.qty || 1) + (action === "inc" ? 1 : -1));
          item.updatedAt = new Date().toISOString();
          if (item.qty === 0) {
            state.cart.delete(cartKey);
          }
          saveCart();
          renderCart();
          return;
        }
        if (action === "clear") {
          state.cart.clear();
          saveCart();
          renderCart();
          return;
        }
        if (action === "copy") {
          await copyCartList();
          return;
        }
        if (action === "buy") {
          await copyCartList();
          window.open("https://www.ligapokemon.com.br/?view=cards/lista", "_blank", "noopener,noreferrer");
        }
      }

      async function copyCartList() {
        const text = buildLigaListText(state.cartListPage);
        try {
          await navigator.clipboard.writeText(text);
        } catch (error) {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          document.body.append(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
        }
        const pages = buildLigaListPages();
        addNotice(`List page ${state.cartListPage + 1}/${Math.max(1, pages.length)} copied.`, "warn", 2200);
      }

      function buildLigaListText(pageIndex = state.cartListPage) {
        const pages = buildLigaListPages();
        const page = pages[clampCartListPage(pageIndex, pages.length)];
        return page?.text || "";
      }

      function buildLigaListPages() {
        const pages = [];
        let currentLines = [];
        let currentCount = 0;
        Array.from(state.cart.values()).forEach((item) => {
          let remaining = Math.max(1, Number(item.qty || 1));
          while (remaining > 0) {
            if (currentCount >= CART_LIST_PAGE_SIZE) {
              pages.push(makeLigaListPage(currentLines, currentCount));
              currentLines = [];
              currentCount = 0;
            }
            const qty = Math.min(remaining, CART_LIST_PAGE_SIZE - currentCount);
            currentLines.push(buildLigaListLine(item, qty));
            currentCount += qty;
            remaining -= qty;
          }
        });
        if (currentLines.length || !pages.length) {
          pages.push(makeLigaListPage(currentLines, currentCount));
        }
        return pages;
      }

      function makeLigaListPage(lines, count) {
        return {
          lines,
          count,
          text: lines.join("\n")
        };
      }

      function buildLigaListLine(item, qty) {
          const card = findCard(item.cardKey);
          const snapshot = card ? getCartSnapshot(card, state.sets.get(card.setKey), item.variant || "normal") : item.snapshot;
          const name = snapshot?.name || item.cardKey;
          const number = snapshot?.number || "";
          return `${qty} ${name.toLocaleLowerCase("pt-BR")} (${number}) [qualidade=${formatLigaCondition(item.condition)}]${buildLigaVariantExtra(item.variant || "normal")}`;
      }

      function clampCartListPage(pageIndex, pageCount) {
        const max = Math.max(0, Number(pageCount || 1) - 1);
        return Math.max(0, Math.min(max, Number(pageIndex || 0)));
      }

      function getCartSnapshot(card, set, variant = "normal") {
        return {
          name: card.name,
          number: formatLigaCardNumber(card, set),
          variant,
          setName: set?.name || "",
          ligaUrl: buildLigaPokemonUrl(card, set)
        };
      }

      function makeCartKey(cardKey, variant) {
        return `${cardKey}:${variant || "normal"}`;
      }

      function buildLigaVariantExtra(variant) {
        if (variant === "reverse") return "[extras=reverse foil]";
        if (variant === "holo") return "[extras=foil]";
        return "";
      }

      function buildLigaVariantExtraLabel(variant) {
        if (variant === "reverse") return "reverse foil";
        if (variant === "holo") return "foil";
        return "";
      }

      function formatPriceInput(value) {
        const number = Number(value || 0);
        return number > 0 ? number.toFixed(2).replace(".", ",") : "";
      }

      function parseBrazilianPrice(value) {
        const cleaned = String(value || "")
          .replace(/[^\d,.-]/g, "")
          .replace(/\./g, "")
          .replace(",", ".");
        const number = Number(cleaned);
        return Number.isFinite(number) && number > 0 ? number : 0;
      }

      async function fetchLigaPricesForCard(cardKey) {
        const card = findCard(cardKey);
        if (!card) return;
        const set = state.sets.get(card.setKey);
        try {
          const response = await fetch(buildLigaPokemonUrl(card, set));
          if (!response.ok) throw new Error(`LigaPokemon ${response.status}`);
          const html = await response.text();
          const prices = parseLigaPricesFromHtml(html);
          await saveParsedLigaPrices(card.key, prices);
          addNotice("LigaPokemon prices updated.", "warn", 2500);
        } catch (error) {
          addNotice("LigaPokemon blocked direct reads from the local HTML app. Open the link and enter prices manually in the card panel.", "error");
          console.warn("Liga price fetch failed:", error);
        }
      }

      function parseLigaPricesFromHtml(html) {
        const text = String(html || "").replace(/\s+/g, " ");
        const money = Array.from(text.matchAll(/R\$\s*([0-9]+(?:[.,][0-9]{2})?)/gi)).map((match) => parseBrazilianPrice(match[1]));
        const min = money.filter((price) => price > 0).sort((a, b) => a - b)[0] || 0;
        const reverseMatch = text.match(/Reverse\s*Foil.{0,180}?R\$\s*([0-9]+(?:[.,][0-9]{2})?)/i);
        return {
          normal: min,
          reverse: reverseMatch ? parseBrazilianPrice(reverseMatch[1]) : 0
        };
      }

      async function saveParsedLigaPrices(cardKey, prices) {
        const entry = getCollection(cardKey);
        if (prices.normal) entry.normalPrice = prices.normal;
        if (prices.holo) entry.holoPrice = prices.holo;
        if (prices.reverse) entry.reversePrice = prices.reverse;
        entry.updatedAt = new Date().toISOString();
        state.collection.set(cardKey, entry);
        await idbPut("collection", entry);
        renderAll();
        scheduleCloudSync();
      }

      async function exportBackup() {
        const backup = {
          app: "Binder BR",
          version: 1,
          exportedAt: new Date().toISOString(),
          sets: state.db ? await idbGetAll("sets") : Array.from(state.sets.values()),
          cards: state.db ? await idbGetAll("cards") : Array.from(state.cardsBySet.values()).flatMap((bucket) => Array.from(bucket.values())),
          collection: Array.from(state.collection.values()),
          cart: Array.from(state.cart.values())
        };
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `binder-br-backup-${new Date().toISOString().slice(0, 10)}.json`;
        document.body.append(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function importBackup(event) {
        const file = event.target.files?.[0];
        event.target.value = "";
        if (!file) return;
        try {
          const text = await file.text();
          const backup = JSON.parse(text);
          if (!window.confirm("Import this backup? Existing collection quantities for matching cards will be replaced.")) {
            return;
          }
          const sets = Array.isArray(backup.sets) ? backup.sets : [];
          const cards = Array.isArray(backup.cards) ? backup.cards : [];
          const collection = Array.isArray(backup.collection) ? backup.collection : [];
          const cart = Array.isArray(backup.cart) ? backup.cart.map(normalizeCartItem).filter(Boolean) : [];
          const importedAt = new Date().toISOString();
          sets.forEach((set) => mergeSet(set, true));
          cards.forEach((card) => mergeCard(card, true));
          collection.forEach((entry) => {
            const normalized = normalizeCollection({ ...entry, updatedAt: entry.updatedAt || importedAt });
            state.collection.set(normalized.cardKey, normalized);
          });
          if (cart.length) {
            state.cart = new Map(cart.map((item) => [item.cartKey, { ...item, updatedAt: item.updatedAt || importedAt }]));
            state.cloud.cartUpdatedAt = importedAt;
            saveCart(false);
          }
          await Promise.all([
            idbPutMany("sets", sets),
            idbPutMany("cards", cards),
            idbPutMany("collection", collection.map((entry) => normalizeCollection({ ...entry, updatedAt: entry.updatedAt || importedAt })))
          ]);
          persistCloudConfig();
          renderAll();
          scheduleCloudSync();
          addNotice("Backup imported.", "warn", 3500);
        } catch (error) {
          addNotice("Backup import failed. The JSON file could not be read.", "error");
          console.warn("Import failed:", error);
        }
      }

      async function resetCollectionOnly() {
        if (!window.confirm("Reset only your collection quantities, prices, notes, and LigaPokemon URLs? Catalog cache will stay.")) {
          return;
        }
        state.cloud.collectionResetAt = new Date().toISOString();
        persistCloudConfig();
        state.collection.clear();
        await idbClear("collection");
        renderAll();
        scheduleCloudSync();
        addNotice("Collection state reset. Catalog cache was kept.", "warn", 4000);
      }

      async function resetCacheOnly() {
        if (!window.confirm("Reset only the TCGdex catalog cache? Your collection quantities will stay.")) {
          return;
        }
        await Promise.all([idbClear("sets"), idbClear("cards"), idbClear("meta")]);
        const collection = new Map(state.collection);
        state.sets.clear();
        state.cardsBySet.clear();
        seedFallbackCatalog();
        state.collection = collection;
        renderAll();
        startSyncFlow(true);
      }

      function findCard(cardKey) {
        for (const bucket of state.cardsBySet.values()) {
          if (bucket.has(cardKey)) return bucket.get(cardKey);
        }
        return null;
      }

      function buildLigaPokemonSetUrl(set) {
        const meta = getLigaSetMeta(set);
        const query = meta ? `edid=${meta.edid} ed=${meta.ed}` : (set?.name || "");
        return `https://www.ligapokemon.com.br/?view=cards/search&card=${encodeURIComponent(query)}`;
      }

      function buildLigaPokemonUrl(card, set) {
        const meta = getLigaSetMeta(set);
        const number = formatLigaCardNumber(card, set);
        const query = meta
          ? `${card.name} ${number} edid=${meta.edid} ed=${meta.ed}`
          : [card.name, number, set?.name].filter(Boolean).join(" ");
        return `https://www.ligapokemon.com.br/?view=cards/search&card=${encodeURIComponent(query)}`;
      }

      function getLigaSetMeta(set) {
        if (!set) return null;
        return LIGA_SET_MAP[set.key] || null;
      }

      function formatLigaCardNumber(card, set) {
        const local = String(card?.localId || "?");
        const total = getPrintedBaseTotal(set) || "?";
        const width = /^\d+$/.test(local) ? local.length : 3;
        const totalText = total === "?" ? total : String(total).padStart(width, "0");
        return `${local}/${totalText}`;
      }

      function formatLigaCondition(condition) {
        return String(condition || "NM").toLowerCase();
      }

      function inferPrintedSetTotal(set) {
        if (!set) return 0;
        const byCode = {
          "pt-br:sv07": 142,
          "pt-br:me04": 86,
          "pt-br:me03": 88
        };
        return byCode[set.key] || 0;
      }

      function getPrintedBaseTotal(set) {
        if (!set) return 0;
        const mappedTotal = inferPrintedSetTotal(set);
        if (mappedTotal) return mappedTotal;
        const officialTotal = Number(set.officialCardCount || 0) || 0;
        if (officialTotal) return officialTotal;
        return Number(set.cardCount || 0) || 0;
      }

      async function mapLimit(items, limit, mapper) {
        let nextIndex = 0;
        const workers = Array.from({ length: Math.min(limit, items.length) }, async () => {
          while (nextIndex < items.length) {
            const currentIndex = nextIndex;
            nextIndex += 1;
            await mapper(items[currentIndex], currentIndex);
          }
        });
        await Promise.all(workers);
      }

      function makeSetKey(lang, id) {
        return `${lang}:${id}`;
      }

      function makeSeriesPageKey(lang, seriesId) {
        return `series:${lang}:${seriesId || "other"}`;
      }

      function makeMissingSetPageKey(lang, setId) {
        return `missing-set:${lang}:${setId || "unknown"}`;
      }

      function isMissingSetPageKey(value) {
        return String(value || "").startsWith("missing-set:");
      }

      function isSeriesPageKey(value) {
        return String(value || "").startsWith("series:");
      }

      function parseSeriesPageKey(value) {
        const text = String(value || "");
        const parts = text.startsWith("series:") ? text.split(":").slice(1) : text.split(":");
        if (parts.length < 2) return null;
        return { lang: parts[0], seriesId: parts.slice(1).join(":") || "other" };
      }

      function makeCardKey(lang, id) {
        return `${lang}:${id}`;
      }

      function inferSetIdFromCardId(id) {
        const parts = String(id || "").split("-");
        if (parts.length <= 1) return "";
        parts.pop();
        return parts.join("-");
      }

      function inferSeriesId(assetUrl) {
        const match = String(assetUrl || "").match(/assets\.tcgdex\.net\/[^/]+\/([^/]+)\//i);
        return match ? match[1] : "";
      }

      function normalizeDate(value) {
        if (!value) return "";
        const match = String(value).match(/\d{4}-\d{2}-\d{2}/);
        return match ? match[0] : String(value);
      }

      function dateValue(value) {
        if (!value) return 0;
        const time = Date.parse(value);
        return Number.isFinite(time) ? time : 0;
      }

      function displayYear(value) {
        if (!value) return "";
        return String(value).slice(0, 4);
      }

      function formatDate(value) {
        if (!value) return "Release date unknown";
        const date = new Date(`${value}T00:00:00`);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric"
        }).format(date);
      }

      function formatMonthYear(value) {
        if (!value) return "";
        const date = new Date(`${value}T00:00:00`);
        if (Number.isNaN(date.getTime())) return displayYear(value);
        return new Intl.DateTimeFormat(undefined, {
          year: "numeric",
          month: "short"
        }).format(date);
      }

      function formatMoney(value) {
        return new Intl.NumberFormat("pt-BR", {
          style: "currency",
          currency: "BRL"
        }).format(Number(value || 0));
      }

      function naturalCompare(a, b) {
        return String(a || "").localeCompare(String(b || ""), undefined, {
          numeric: true,
          sensitivity: "base"
        });
      }

      function normalizeSearch(value) {
        return String(value || "")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase();
      }

      function slugify(value) {
        return normalizeSearch(value).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "other";
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value);
      }
    })();
  </script>
</body>
</html>
